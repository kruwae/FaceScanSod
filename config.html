<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตั้งค่าระบบ | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  
  <!-- Google Maps API - กรุณาใส่ API Key ของคุณที่นี่ -->
  <!-- <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script> -->
  <!-- หมายเหตุ: ในโค้ดด้านล่างจะใช้ระบบโหลด Dynamic เพื่อให้คุณใส่ Key ผ่านหน้าจอได้ -->

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 420px;
      height: 420px;
      background: #06b6d4;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.08;
      top: -120px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 760px;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 18px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.88em;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.25s ease;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    .back-btn:hover {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.1);
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(6, 182, 212, 0.14);
      border: 1px solid rgba(6, 182, 212, 0.25);
      color: #a5f3fc;
      font-size: 0.84em;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 1.6em;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 0.83em;
      color: #94a3b8;
      line-height: 1.6;
    }

    .warning-box {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.26);
      color: #fde68a;
      border-radius: 16px;
      padding: 14px 16px;
      line-height: 1.65;
      font-size: 0.9em;
      margin: 16px 0 18px;
      text-align: left;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px 22px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .section-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .section-icon.indigo { background: rgba(99, 102, 241, 0.2); }
    .section-icon.cyan { background: rgba(6, 182, 212, 0.2); }
    .section-icon.green { background: rgba(16, 185, 129, 0.2); }

    .section-title-text {
      font-weight: 600;
      font-size: 0.95em;
      color: #c7d2fe;
    }

    label {
      display: block;
      font-size: 0.82em;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: rgba(6, 182, 212, 0.5);
      background: rgba(6, 182, 212, 0.07);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
    }

    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 13px;
      width: 100%;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }

    .btn-save {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      font-size: 16px;
      padding: 15px;
    }

    .locations {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .location-item {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 14px;
      position: relative;
    }

    .location-item__top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .location-item__title {
      font-weight: 700;
      color: #f8fafc;
      font-size: 0.98em;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .maps-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .maps-input-row input {
      flex: 1;
      margin-bottom: 0;
      border: 1px dashed rgba(16,185,129,0.35);
    }

    .btn-parse-maps {
      width: auto;
      padding: 0 15px;
      background: #10b981;
      color: white;
      font-size: 13px;
    }

    .map-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      z-index: 9999;
      flex-direction: column;
      backdrop-filter: blur(12px);
    }

    .map-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #mapContainer {
      flex: 1;
      width: 100%;
    }

    .map-footer {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 12px;
    }

    .btn-map-confirm { flex: 2; background: #06b6d4; color: white; }
    .btn-map-current { flex: 1; background: #10b981; color: white; }
    .btn-map-cancel { flex: 1; background: rgba(255, 255, 255, 0.1); color: #e2e8f0; }

    .msg-success { color: #34d399; text-align: center; margin-top: 10px; font-weight: 600; }
    .msg-error { color: #f87171; text-align: center; margin-top: 10px; font-weight: 600; }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <a href="index.html" class="back-btn">← กลับเมนูหลัก</a>
      <div class="admin-badge">🔒 Admin Only</div>
      <h2>⚙️ ตั้งค่าระบบ (Google Maps)</h2>
      <p class="page-subtitle">กำหนดพิกัดหน่วยบริการด้วย Google Maps API</p>
    </div>

    <div id="adminContent">
      <div class="admin-header-actions" style="display:flex; justify-content: flex-end; margin-bottom: 10px;">
        <button class="btn" id="btnLogoutTop" style="width:auto; padding: 8px 15px; background: rgba(239,68,68,0.1); color: #fca5a5;">ออกจากระบบ</button>
      </div>

      <div class="card">
        <div class="section-header">
          <div class="section-icon indigo">🔗</div>
          <span class="section-title-text">Google Apps Script API</span>
        </div>
        <label>WEB APP URL</label>
        <input type="url" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
        
        <label>GOOGLE MAPS API KEY</label>
        <input type="text" id="googleMapsKey" placeholder="ใส่ API Key ของคุณที่นี่เพื่อใช้งานแผนที่">
        <p style="font-size: 11px; color: #64748b; margin-top: -10px;">* จำเป็นต้องใส่เพื่อให้แผนที่แสดงผลได้ถูกต้อง</p>
      </div>

      <div class="card">
        <div class="section-header">
          <div class="section-icon cyan">📍</div>
          <span class="section-title-text">พื้นที่ GPS หน่วยบริการ</span>
        </div>
        <div id="locations" class="locations"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
          <button class="btn" style="background:rgba(99,102,241,0.15); color:#c7d2fe;" onclick="addLocation()">+ เพิ่มตำแหน่ง</button>
          <button class="btn" style="background:rgba(255,255,255,0.05); color:#e2e8f0;" onclick="loadFromServer()">โหลดจากเซิร์ฟเวอร์</button>
        </div>
      </div>

      <div class="card">
        <div class="section-header">
          <div class="section-icon" style="background:rgba(245,158,11,0.15);color:#fcd34d">⏰</div>
          <span class="section-title-text">เวลาทำงาน</span>
        </div>
        <div class="input-row">
          <div><label>เริ่มงาน</label><input type="time" id="workStartTime" value="08:30"></div>
          <div><label>สายหลัง</label><input type="time" id="workLateThreshold" value="08:30"></div>
        </div>
        <div class="input-row">
          <div><label>เลิกงาน</label><input type="time" id="workEndTime" value="16:30"></div>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveAll()">💾 บันทึกการตั้งค่าทั้งหมด</button>
      <div id="msg"></div>

      <div class="card" style="margin-top:20px;">
        <div class="section-header">
          <div class="section-icon green">🛠️</div>
          <span class="section-title-text">เครื่องมือ</span>
        </div>
        <button class="btn" onclick="runInitSetup()" style="background:rgba(16,185,129,0.1); color:#34d399;">🚀 Run Init Setup</button>
      </div>
    </div>
  </div>

  <!-- Map Modal -->
  <div id="mapModal" class="map-modal">
    <div class="map-header">
      <h3 style="color:white;">📍 เลือกตำแหน่งบน Google Maps</h3>
      <button class="btn" style="width:auto; padding:5px 15px;" onclick="closeMap()">ปิด</button>
    </div>
    <div id="mapContainer"></div>
    <div class="map-footer">
      <button class="btn btn-map-current" onclick="focusCurrentLocation()">📍 ตำแหน่งปัจจุบัน</button>
      <button class="btn btn-map-confirm" onclick="confirmMapSelection()">✅ ยืนยันตำแหน่งนี้</button>
      <button class="btn btn-map-cancel" onclick="closeMap()">ยกเลิก</button>
    </div>
  </div>

  <script>
    let map, marker;
    let activeLatInput, activeLngInput;
    const locationsBox = document.getElementById('locations');
    const msgDiv = document.getElementById('msg');

    // Load Google Maps API Dynamically
    function loadGoogleMaps() {
      const key = document.getElementById('googleMapsKey').value.trim();
      if (!key) {
        alert('กรุณาใส่ Google Maps API Key ก่อนใช้งานแผนที่');
        return false;
      }
      if (window.google && window.google.maps) return true;

      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
      return true;
    }

    function openMap(latInput, lngInput) {
      if (!loadGoogleMaps()) return;
      
      activeLatInput = latInput;
      activeLngInput = lngInput;
      document.getElementById('mapModal').style.display = 'flex';

      const initialLat = parseFloat(latInput.value) || 13.7563;
      const initialLng = parseFloat(lngInput.value) || 100.5018;

      setTimeout(() => {
        const mapOptions = {
          center: { lat: initialLat, lng: initialLng },
          zoom: 15,
          mapTypeId: 'roadmap'
        };
        map = new google.maps.Map(document.getElementById('mapContainer'), mapOptions);
        
        marker = new google.maps.Marker({
          position: { lat: initialLat, lng: initialLng },
          map: map,
          draggable: true
        });

        map.addListener('click', (e) => {
          marker.setPosition(e.latLng);
        });
      }, 500);
    }

    function focusCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          map.setCenter(coords);
          map.setZoom(17);
          marker.setPosition(coords);
        }, () => alert('ไม่สามารถดึงตำแหน่งปัจจุบันได้'), { enableHighAccuracy: true });
      }
    }

    function confirmMapSelection() {
      const pos = marker.getPosition();
      activeLatInput.value = pos.lat().toFixed(6);
      activeLngInput.value = pos.lng().toFixed(6);
      closeMap();
    }

    function closeMap() {
      document.getElementById('mapModal').style.display = 'none';
    }

    function createLocationItem(loc = {}) {
      const wrap = document.createElement('div');
      wrap.className = 'location-item';
      wrap.dataset.id = loc.id || '';
      
      wrap.innerHTML = `
        <div class="location-item__top">
          <span class="location-item__title">🏥 ${loc.id ? 'บันทึกแล้ว' : 'ตำแหน่งใหม่'}</span>
          <div style="display:flex; gap:5px;">
            <button class="btn" style="width:auto; padding:5px 10px; background:#10b981; color:white; font-size:12px;" onclick="saveSingleLocation(this.parentElement.parentElement.parentElement)">💾 บันทึก</button>
            <button class="btn" style="width:auto; padding:5px 10px; background:rgba(239,68,68,0.1); color:#fca5a5; font-size:12px;" onclick="removeLocation(this.parentElement.parentElement.parentElement)">ลบ</button>
          </div>
        </div>
        <label>ชื่อสถานที่</label>
        <input type="text" class="loc-name" value="${loc.name || ''}" placeholder="ชื่อหน่วยบริการ">
        <div class="input-row">
          <div><label>Latitude</label><input type="number" step="any" class="loc-lat" value="${loc.lat || ''}" readonly onclick="openMap(this, this.parentElement.parentElement.querySelector('.loc-lng'))" style="cursor:pointer"></div>
          <div><label>Longitude</label><input type="number" step="any" class="loc-lng" value="${loc.lng || ''}" readonly onclick="openMap(this.parentElement.parentElement.querySelector('.loc-lat'), this)" style="cursor:pointer"></div>
        </div>
        <div class="input-row">
          <div><label>รัศมี (เมตร)</label><input type="number" class="loc-radius" value="${loc.radius || 100}"></div>
          <div><label>เปิดใช้งาน</label><input type="text" class="loc-enabled" value="${loc.enabled !== false ? 'true' : 'false'}"></div>
        </div>
      `;
      return wrap;
    }

    function addLocation(loc = {}) {
      locationsBox.appendChild(createLocationItem(loc));
    }

    async function saveSingleLocation(rowEl) {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = sessionStorage.getItem('adminToken') || '';
      if (!apiUrl) return alert('กรุณาใส่ API URL');

      const data = {
        action: 'saveLocation',
        id: rowEl.dataset.id,
        name: rowEl.querySelector('.loc-name').value.trim(),
        lat: rowEl.querySelector('.loc-lat').value,
        lng: rowEl.querySelector('.loc-lng').value,
        radius: rowEl.querySelector('.loc-radius').value,
        token: token,
        updatedBy: sessionStorage.getItem('adminName') || 'admin'
      };

      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success || result.status === 'ok') {
          rowEl.dataset.id = result.id;
          alert('✅ บันทึกสำเร็จ');
        } else {
          alert('❌ ' + result.message);
        }
      } catch (e) { alert('❌ Error: ' + e.message); }
    }

    async function removeLocation(rowEl) {
      const id = rowEl.dataset.id;
      if (!id) return rowEl.remove();
      
      if (confirm('ยืนยันการลบพิกัดนี้?')) {
        const apiUrl = document.getElementById('apiUrl').value.trim();
        const token = sessionStorage.getItem('adminToken') || '';
        try {
          const res = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'deleteLocation', id, token })
          });
          const result = await res.json();
          if (result.success || result.status === 'ok') rowEl.remove();
        } catch (e) { alert('Error: ' + e.message); }
      }
    }

    function loadFromServer() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = sessionStorage.getItem('adminToken') || '';
      if (!apiUrl) return;

      fetch(apiUrl + '?action=getConfig&token=' + token)
        .then(r => r.json())
        .then(config => {
          locationsBox.innerHTML = '';
          if (config.locations) config.locations.forEach(loc => addLocation(loc));
          if (config.workTimes) {
            document.getElementById('workStartTime').value = config.workTimes.startTime || '08:30';
            document.getElementById('workLateThreshold').value = config.workTimes.lateThreshold || '08:30';
            document.getElementById('workEndTime').value = config.workTimes.endTime || '16:30';
          }
          if (config.googleMapsKey) document.getElementById('googleMapsKey').value = config.googleMapsKey;
        });
    }

    function saveAll() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = sessionStorage.getItem('adminToken') || '';
      const locations = [...document.querySelectorAll('.location-item')].map(item => ({
        id: item.dataset.id,
        name: item.querySelector('.loc-name').value,
        lat: item.querySelector('.loc-lat').value,
        lng: item.querySelector('.loc-lng').value,
        radius: item.querySelector('.loc-radius').value,
        enabled: item.querySelector('.loc-enabled').value === 'true'
      }));

      const data = {
        action: 'saveConfig',
        apiUrl,
        locations,
        token,
        workTimes: {
          startTime: document.getElementById('workStartTime').value,
          lateThreshold: document.getElementById('workLateThreshold').value,
          endTime: document.getElementById('workEndTime').value
        },
        googleMapsKey: document.getElementById('googleMapsKey').value.trim()
      };

      fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)
      }).then(r => r.json()).then(res => {
        if (res.success || res.status === 'ok') {
          msgDiv.innerText = '✅ บันทึกข้อมูลทั้งหมดเรียบร้อย';
          msgDiv.className = 'msg-success';
          localStorage.setItem('GAS_API_URL', apiUrl);
        }
      });
    }

    async function runInitSetup() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      if (!apiUrl) return alert('กรุณาใส่ API URL');
      const res = await fetch(apiUrl + '?action=initSetup');
      const data = await res.json();
      alert(data.message);
    }

    // Auth Check
    if (sessionStorage.getItem('adminAuth') !== '1') window.location.href = 'login.html';
    document.getElementById('apiUrl').value = localStorage.getItem('GAS_API_URL') || '';
    document.getElementById('btnLogoutTop').onclick = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
    
    loadFromServer();
  </script>
</body>
</html>

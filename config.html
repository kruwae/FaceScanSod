<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตั้งค่าระบบ | Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 28px 16px 60px;
    }
    .container { width: 100%; max-width: 760px; position: relative; z-index: 1; }
    .page-header { margin-bottom: 18px; text-align: center; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px; color: #64748b;
      text-decoration: none; font-size: 0.88em; padding: 6px 12px;
      border-radius: 20px; background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.25s ease;
    }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-radius: 999px; background: rgba(6, 182, 212, 0.14);
      border: 1px solid rgba(6, 182, 212, 0.25); color: #a5f3fc; font-size: 0.84em;
    }
    .card {
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; padding: 24px 22px; backdrop-filter: blur(16px); margin-bottom: 16px;
    }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.07); }
    .section-title-text { font-weight: 600; font-size: 0.95em; color: #c7d2fe; }
    label { display: block; font-size: 0.82em; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
    input, select {
      width: 100%; padding: 12px 14px; background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px;
      color: #e2e8f0; font-size: 14px; outline: none; margin-bottom: 14px;
    }
    select option { background: #1a1a3e; color: white; }
    .btn {
      border: none; border-radius: 12px; cursor: pointer; font-family: 'Sarabun', sans-serif;
      font-size: 15px; font-weight: 600; padding: 13px; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-save { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .location-item { border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.04); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .location-item__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .map-modal {
      display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
      z-index: 9999; flex-direction: column; backdrop-filter: blur(12px);
    }
    #mapContainer { flex: 1; width: 100%; }
    .map-footer { padding: 16px; background: rgba(255, 255, 255, 0.05); display: flex; gap: 12px; }
    .btn-map-confirm { flex: 2; background: #06b6d4; color: white; }
    .btn-map-current { flex: 1; background: #10b981; color: white; }
    .msg-success { color: #34d399; text-align: center; margin-top: 10px; font-weight: 600; }
    .msg-error { color: #f87171; text-align: center; margin-top: 10px; font-weight: 600; }
    .logout-btn {
      border: 1px solid rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1);
      color: #fecaca; border-radius: 12px; padding: 10px 14px; font-weight: 600; cursor: pointer;
    }
    .toggle-container {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255, 255, 255, 0.03); padding: 12px 16px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <a href="index.html" class="back-btn">← กลับเมนูหลัก</a><br><br>
      <div class="admin-badge">🔒 Admin Only</div>
      <h2 style="margin-top:10px;">⚙️ ตั้งค่าระบบ</h2>
    </div>

    <div id="adminContent">
      <div style="display:flex; justify-content:flex-end; margin-bottom:15px;">
        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
      </div>

      <div class="card">
        <div class="section-header"><span class="section-title-text">🔗 Google Apps Script API</span></div>
        <label>WEB APP URL</label>
        <input type="url" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>

      <!-- ส่วนใหม่: ตั้งค่าความปลอดภัยหน้าสแกน -->
      <div class="card">
        <div class="section-header"><span class="section-title-text">🛡️ ความปลอดภัยหน้าสแกน</span></div>
        <div class="toggle-container">
          <div>
            <div style="font-size: 0.9em; font-weight: 600; color: #e2e8f0;">โหมดการสแกนใบหน้า</div>
            <div style="font-size: 0.75em; color: #94a3b8;">เลือกโหมดการเข้าใช้งานสำหรับพนักงาน</div>
          </div>
          <select id="scanMode" style="width: auto; margin-bottom: 0; padding: 8px 12px;">
            <option value="login">🔵 ต้อง Login ก่อนสแกน</option>
            <option value="no-login">🟢 สแกนได้ทันที (ไม่ต้อง Login)</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="section-header"><span class="section-title-text">📍 พื้นที่ GPS หน่วยบริการ</span></div>
        <div id="locations"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="btn" style="background:rgba(99,102,241,0.15); color:#c7d2fe;" onclick="addLocation()">+ เพิ่มตำแหน่ง</button>
          <button class="btn" style="background:rgba(255,255,255,0.05); color:#e2e8f0;" onclick="loadFromServer()">🔄 โหลดข้อมูลใหม่</button>
        </div>
      </div>

      <div class="card">
        <div class="section-header"><span class="section-title-text">⏰ เวลาทำงาน</span></div>
        <div class="input-row">
          <div><label>เริ่มงาน</label><input type="time" id="workStartTime" value="08:30"></div>
          <div><label>สายหลัง</label><input type="time" id="workLateThreshold" value="08:30"></div>
        </div>
        <div class="input-row">
          <div><label>เลิกงาน</label><input type="time" id="workEndTime" value="16:30"></div>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveAll()">💾 บันทึกการตั้งค่าทั้งหมด</button>
      <div id="msg"></div>
    </div>
  </div>

  <!-- Map Modal -->
  <div id="mapModal" class="map-modal">
    <div class="map-header" style="padding:15px; display:flex; justify-content:space-between; align-items:center; color:white;">
      <h3>📍 เลือกตำแหน่งบนแผนที่</h3>
      <button onclick="closeMap()" style="padding:5px 15px; border-radius:8px; border:none; cursor:pointer;">ปิด</button>
    </div>
    <div id="mapContainer"></div>
    <div class="map-footer">
      <button class="btn btn-map-current" onclick="focusCurrentLocation()">📍 ตำแหน่งปัจจุบัน</button>
      <button class="btn btn-map-confirm" onclick="confirmMapSelection()">✅ ยืนยันตำแหน่งนี้</button>
    </div>
  </div>

  <script>
    const locationsBox = document.getElementById('locations');
    const msgDiv = document.getElementById('msg');
    let map, marker;
    let activeLatInput, activeLngInput;

    // ดึง Token จากทุกที่ที่เป็นไปได้
    function getAuthToken() {
      return sessionStorage.getItem('token') || sessionStorage.getItem('adminToken') || localStorage.getItem('token') || '';
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    function openMap(latInput, lngInput) {
      activeLatInput = latInput;
      activeLngInput = lngInput;
      document.getElementById('mapModal').style.display = 'flex';
      if (!map) {
        map = L.map('mapContainer').setView([13.7563, 100.5018], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        map.on('click', (e) => updateMarker(e.latlng.lat, e.latlng.lng));
      }
      const lat = parseFloat(latInput.value);
      const lng = parseFloat(lngInput.value);
      if (!isNaN(lat) && !isNaN(lng)) {
        updateMarker(lat, lng);
        map.setView([lat, lng], 16);
      } else {
        focusCurrentLocation();
      }
      setTimeout(() => map.invalidateSize(), 400);
    }

    function focusCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          updateMarker(pos.coords.latitude, pos.coords.longitude);
          map.setView([pos.coords.latitude, pos.coords.longitude], 17);
        }, () => alert('ไม่สามารถดึงตำแหน่งปัจจุบันได้'), { enableHighAccuracy: true });
      }
    }

    function updateMarker(lat, lng) {
      if (marker) marker.setLatLng([lat, lng]);
      else marker = L.marker([lat, lng], { draggable: true }).addTo(map);
    }

    function confirmMapSelection() {
      if (marker) {
        const pos = marker.getLatLng();
        activeLatInput.value = pos.lat.toFixed(6);
        activeLngInput.value = pos.lng.toFixed(6);
      }
      closeMap();
    }

    function closeMap() { document.getElementById('mapModal').style.display = 'none'; }

    function createLocationItem(loc = {}) {
      const wrap = document.createElement('div');
      wrap.className = 'location-item';
      wrap.dataset.id = loc.id || '';
      wrap.innerHTML = `
        <div class="location-item__top">
          <span style="font-weight:bold; color:#f8fafc;">🏥 ${loc.name || 'ตำแหน่งใหม่'}</span>
          <button class="btn" style="width:auto; padding:5px 10px; background:#10b981; color:white; font-size:12px;" onclick="saveSingleLocation(this.parentElement.parentElement)">💾 บันทึกจุดนี้</button>
        </div>
        <label>ชื่อสถานที่</label>
        <input type="text" class="loc-name" value="${loc.name || ''}" placeholder="ชื่อหน่วยบริการ">
        <div class="input-row">
          <div><label>Latitude</label><input type="number" step="any" class="loc-lat" value="${loc.lat || ''}" readonly onclick="openMap(this, this.parentElement.parentElement.querySelector('.loc-lng'))" style="cursor:pointer"></div>
          <div><label>Longitude</label><input type="number" step="any" class="loc-lng" value="${loc.lng || ''}" readonly onclick="openMap(this.parentElement.parentElement.querySelector('.loc-lat'), this)" style="cursor:pointer"></div>
        </div>
        <div class="input-row">
          <div><label>รัศมี (เมตร)</label><input type="number" class="loc-radius" value="${loc.radius || 100}"></div>
          <div><label>เปิดใช้งาน</label><input type="text" class="loc-enabled" value="${loc.enabled !== false ? 'true' : 'false'}"></div>
        </div>
      `;
      return wrap;
    }

    function addLocation(loc = {}) { locationsBox.appendChild(createLocationItem(loc)); }

    async function saveSingleLocation(rowEl) {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = getAuthToken();
      if (!apiUrl) return alert('กรุณาใส่ API URL');
      
      const data = {
        action: 'saveLocation',
        id: rowEl.dataset.id,
        name: rowEl.querySelector('.loc-name').value.trim(),
        lat: rowEl.querySelector('.loc-lat').value,
        lng: rowEl.querySelector('.loc-lng').value,
        radius: rowEl.querySelector('.loc-radius').value,
        token: token,
        updatedBy: sessionStorage.getItem('adminName') || 'admin'
      };

      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success || result.status === 'ok') {
          rowEl.dataset.id = result.id;
          Swal.fire('สำเร็จ', 'บันทึกตำแหน่งเรียบร้อย', 'success');
        } else {
          Swal.fire('ผิดพลาด', result.message || 'Unauthorized', 'error');
        }
      } catch (e) { Swal.fire('ผิดพลาด', e.message, 'error'); }
    }

    async function loadFromServer() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = getAuthToken();
      if (!apiUrl) return;

      Swal.fire({
        title: '正在加载...',
        text: 'กำลังโหลดข้อมูลพิกัดจาก Google Sheets...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        const res = await fetch(`${apiUrl}?action=getConfig&token=${token}`);
        const data = await res.json();
        Swal.close();

        if (data.status === 'ok') {
          locationsBox.innerHTML = '';
          if (data.locations && data.locations.length > 0) {
            data.locations.forEach(addLocation);
            if (data.workTimes) {
              document.getElementById('workStartTime').value = data.workTimes.start || '08:30';
              document.getElementById('workLateThreshold').value = data.workTimes.late || '08:30';
              document.getElementById('workEndTime').value = data.workTimes.end || '16:30';
            }
            if (data.scanMode) {
              document.getElementById('scanMode').value = data.scanMode;
            }
            Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'โหลดข้อมูลพิกัดเรียบร้อย (' + data.locations.length + ' จุด)', timer: 1500 });
          } else {
            Swal.fire({ icon: 'info', title: 'ไม่พบข้อมูล', text: 'ในชีต Config ยังไม่มีรายการข้อมูลพิกัด' });
          }
        } else {
          Swal.fire('ผิดพลาด', data.message || 'ไม่สามารถโหลดข้อมูลได้', 'error');
        }
      } catch (e) { 
        Swal.close();
        Swal.fire('เชื่อมต่อล้มเหลว', 'ไม่สามารถเชื่อมต่อกับ Apps Script ได้: ' + e.message, 'error');
        console.error(e); 
      }
    }

    async function saveAll() {
      const apiUrl = document.getElementById('apiUrl').value.trim();
      const token = getAuthToken();
      if (!apiUrl) return Swal.fire('ผิดพลาด', 'กรุณาใส่ API URL', 'error');

      const locations = [...document.querySelectorAll('.location-item')].map(item => ({
        id: item.dataset.id,
        name: item.querySelector('.loc-name').value,
        lat: item.querySelector('.loc-lat').value,
        lng: item.querySelector('.loc-lng').value,
        radius: item.querySelector('.loc-radius').value,
        enabled: item.querySelector('.loc-enabled').value === 'true'
      }));

      const data = {
        action: 'saveConfig',
        apiUrl: apiUrl,
        scanMode: document.getElementById('scanMode').value,
        locations: JSON.stringify(locations),
        workTimes: {
          start: document.getElementById('workStartTime').value,
          late: document.getElementById('workLateThreshold').value,
          end: document.getElementById('workEndTime').value
        },
        token: token,
        updatedBy: sessionStorage.getItem('adminName') || 'admin'
      };

      Swal.fire({
        title: '正在保存...',
        text: 'กำลังบันทึกการตั้งค่าลง Google Sheets...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
      });

      try {
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        Swal.close();

        if (result.success || result.status === 'ok') {
          localStorage.setItem('GAS_API_URL', apiUrl);
          Swal.fire('สำเร็จ', 'บันทึกการตั้งค่าทั้งหมดเรียบร้อย', 'success');
        } else {
          Swal.fire('บันทึกไม่สำเร็จ', result.message || 'Unauthorized', 'error');
        }
      } catch (e) { 
        Swal.close();
        Swal.fire('เชื่อมต่อล้มเหลว', 'ไม่สามารถส่งข้อมูลไปยัง Apps Script ได้: ' + e.message, 'error');
      }
    }

    window.onload = () => {
      const savedUrl = localStorage.getItem('GAS_API_URL');
      if (savedUrl) {
        document.getElementById('apiUrl').value = savedUrl;
        loadFromServer();
      }
    };
  </script>
</body>
</html>

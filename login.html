<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | ระบบสแกนหน้า</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script type="module">
    import { getApiUrl } from './src/core/api.js';
    if (typeof window !== 'undefined') {
      window.getApiUrl = getApiUrl;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient orbs */
    body::before {
      content: '';
      position: fixed;
      width: 420px; height: 420px;
      background: #6366f1;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.13;
      top: -120px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 320px; height: 320px;
      background: #06b6d4;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.09;
      bottom: -80px; right: -80px;
      pointer-events: none; z-index: 0;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 28px 28px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.5s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .lock-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px; height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
      font-size: 34px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.55em;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.88em;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* Destination badge */
    .dest-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(99,102,241,0.14);
      border: 1px solid rgba(99,102,241,0.28);
      color: #c7d2fe;
      font-size: 0.82em;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .login-tab {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.04);
      color: #cbd5e1;
      display: block;
    }

    .login-tab.active {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
    }

    .login-field {
      width: 100%;
      margin-bottom: 14px;
      display: none;
    }

    .login-field.active {
      display: block;
    }

    .login-field input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 15px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      background: rgba(15,23,42,0.35);
      color: #e2e8f0;
      outline: none;
    }

    .login-field input::placeholder {
      color: #64748b;
    }

    .login-field input:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }

    .google-login-wrap {
      width: 100%;
      margin-bottom: 14px;
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 48px;
    }

    .google-login-wrap.active {
      display: flex;
    }

    .google-login-note {
      width: 100%;
      font-size: 0.84em;
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 8px;
      margin-bottom: 6px;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.45);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.85em;
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
      margin-top: 16px;
    }

    .back-link:hover {
      color: #e2e8f0;
      background: rgba(255,255,255,0.09);
    }

    .security-note {
      margin-top: 20px;
      font-size: 0.76em;
      color: #475569;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 10px 12px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="login-card" id="loginCard">
    <div class="lock-badge">🔒</div>
    <h1>Admin Only</h1>
    <p class="subtitle">
      หน้านี้สำหรับผู้ดูแลระบบเท่านั้น<br>
      กรุณายืนยันรหัสแอดมินก่อนเข้าใช้งาน
    </p>

    <div class="dest-badge" id="destBadge">🔗 กำลังโหลด...</div>

    <div class="login-tabs">
      <button type="button" class="login-tab active" id="tabCode">เข้าด้วยรหัส</button>
      <button type="button" class="login-tab" id="tabGoogle">เข้าด้วย Gmail</button>
    </div>

    <div class="login-field active" id="fieldCode">
      <input type="password" id="adminCode" placeholder="รหัสแอดมิน" autocomplete="current-password">
    </div>

    <div class="login-field" id="fieldGoogle">
      <div id="googleButton" class="google-login-wrap"></div>
      <div class="google-login-note">ลงชื่อเข้าใช้ด้วยบัญชี Google ที่เป็นอีเมลแอดมินในระบบ</div>
    </div>

    <button class="btn-login" id="btnLogin">🔓 ยืนยันรหัสแอดมิน</button>

    <a href="index.html" class="back-link">← กลับเมนูหลัก</a>

    <div class="security-note">
      🛡️ Session จะหมดอายุเมื่อปิด browser tab — ต้อง login ใหม่ทุกครั้ง
    </div>
  </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    // ============================================================
    //  Admin Login — Central page
    //  SECURITY: ไม่มี hardcoded fallback — ตรวจผ่าน GAS API เท่านั้น
    // ============================================================
    const SESSION_KEY = 'adminAuth';

    const btnLogin  = document.getElementById('btnLogin');
    const destBadge = document.getElementById('destBadge');
    const tabCode   = document.getElementById('tabCode');
    const tabGoogle = document.getElementById('tabGoogle');
    const fieldCode = document.getElementById('fieldCode');
    const fieldGoogle = document.getElementById('fieldGoogle');
    const adminCode = document.getElementById('adminCode');
    const googleButton = document.getElementById('googleButton');
    let authMethod = 'code';
    let googleClientReady = false;
    let googleButtonRendered = false;

    // ---- อ่าน ?to=... จาก URL เพื่อรู้ว่าจะ redirect ไปหน้าไหน ----
    const params   = new URLSearchParams(window.location.search);
    const destPage = params.get('to') || 'config.html';

    // แสดงปลายทาง
    const destLabel = {
      'config.html':   '⚙️ ตั้งค่าระบบ (config)',
      'register.html': '👤 ลงทะเบียนพนักงาน (register)',
    };
    destBadge.textContent = destLabel[destPage] || ('→ ' + destPage);

    function setAuthMethod(method) {
      authMethod = method;
      tabCode.classList.toggle('active', method === 'code');
      tabGoogle.classList.toggle('active', method === 'google');
      fieldCode.classList.toggle('active', method === 'code');
      fieldGoogle.classList.toggle('active', method === 'google');
      if (googleButton) googleButton.classList.toggle('active', method === 'google');
      btnLogin.style.display = method === 'code' ? 'flex' : 'none';
      if (method === 'google') {
        renderGoogleLogin();
      }
    }

    tabCode.addEventListener('click', () => setAuthMethod('code'));
    tabGoogle.addEventListener('click', () => setAuthMethod('google'));
    setAuthMethod('code');

    // ---- ตรวจสอบ session ----
    function isAuthed() {
      try { return sessionStorage.getItem(SESSION_KEY) === '1'; }
      catch(e) { return false; }
    }

    // ถ้า login อยู่แล้ว → ไปเลย
    if (isAuthed()) { window.location.replace(destPage); }

    // ---- API URL ----
    function getApiUrl() {
      return typeof window.getApiUrl === 'function' ? window.getApiUrl() : (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '').trim();
    }

    function normalizeCodeInput(value) {
      return String(value || '')
        .replace(/\u00A0/g, ' ')
        .replace(/\u200B/g, '')
        .replace(/\u200C/g, '')
        .replace(/\u200D/g, '')
        .replace(/\uFEFF/g, '')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .trim();
    }

    async function loginWithCode(code) {
      const trimmed = normalizeCodeInput(code);
      const apiUrl  = getApiUrl();

      if (!apiUrl) {
        return { ok: false, error: 'ยังไม่ได้ตั้งค่า API URL — ไปตั้งค่าที่ config.html ก่อน' };
      }

      try {
        const ctrl  = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 15000);
        const formData = new URLSearchParams();
        formData.set('action', 'login');
        formData.set('authMethod', 'code');
        formData.set('username', 'admin');
        formData.set('code', trimmed);

        const res   = await fetch(apiUrl + '?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', authMethod: 'code', username: 'admin', code: trimmed }),
          signal: ctrl.signal
        });
        clearTimeout(timer);
        const data = await res.json();

        if (data.status === 'ok' && data.token) {
          try { localStorage.setItem('token', data.token); } catch (e) {}
          try { localStorage.setItem('readToken', data.readToken || ''); } catch (e) {}
          return { ok: true, token: data.token };
        }

        return { ok: false, error: data.message || data.error || 'รหัสไม่ถูกต้อง' };
      } catch (e) {
        if (e.name === 'AbortError') {
          return { ok: false, error: 'Server ใช้เวลาตอบนานเกินไป (cold start) — กรุณาลองใหม่อีกครั้ง' };
        }
        return { ok: false, error: 'เชื่อมต่อ Server ไม่ได้ — ตรวจสอบ API URL ใน config.html' };
      }
    }

    async function loginWithGoogle(idToken) {
      const apiUrl = getApiUrl();

      if (!apiUrl) {
        return { ok: false, error: 'ยังไม่ได้ตั้งค่า API URL — ไปตั้งค่าที่ config.html ก่อน' };
      }

      try {
        const ctrl  = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 15000);
        const res   = await fetch(apiUrl + '?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', authMethod: 'google', idToken: idToken }),
          signal: ctrl.signal
        });
        clearTimeout(timer);
        const data = await res.json();

        if (data.status === 'ok' && data.token) {
          try { localStorage.setItem('token', data.token); } catch (e) {}
          try { localStorage.setItem('readToken', data.readToken || ''); } catch (e) {}
          return { ok: true, token: data.token };
        }

        return { ok: false, error: data.message || data.error || 'เข้าสู่ระบบด้วย Google ไม่สำเร็จ' };
      } catch (e) {
        if (e.name === 'AbortError') {
          return { ok: false, error: 'Server ใช้เวลาตอบนานเกินไป (cold start) — กรุณาลองใหม่อีกครั้ง' };
        }
        return { ok: false, error: 'เชื่อมต่อ Server ไม่ได้ — ตรวจสอบ API URL ใน config.html' };
      }
    }

    function getGoogleClientId() {
      return (
        window.GOOGLE_OAUTH_CLIENT_ID ||
        window.GOOGLE_CLIENT_ID ||
        localStorage.getItem('googleClientId') ||
        ''
      ).trim();
    }

    function renderGoogleLogin(force) {
      if (!googleButton) { return; }

      const clientId = getGoogleClientId();
      if (!clientId) {
        googleButton.innerHTML = '<div style="color:#94a3b8;font-size:0.9em;line-height:1.6;">ยังไม่ได้ตั้งค่า Google Client ID</div>';
        googleButtonRendered = false;
        return;
      }

      if (!window.google || !google.accounts || !google.accounts.id) {
        googleButton.innerHTML = '<div style="color:#94a3b8;font-size:0.9em;line-height:1.6;">กำลังโหลด Google Sign-In...</div>';
        googleButtonRendered = false;
        return;
      }

      if (!googleClientReady) {
        google.accounts.id.initialize({
          client_id: clientId,
          callback: handleGoogleCredentialResponse,
          auto_select: false,
          cancel_on_tap_outside: true
        });
        googleClientReady = true;
      }

      if (googleButtonRendered && !force) return;

      googleButton.innerHTML = '';
      google.accounts.id.renderButton(googleButton, {
        theme: 'outline',
        size: 'large',
        type: 'standard',
        shape: 'pill',
        text: 'signin_with',
        width: 320,
        locale: 'th'
      });
      googleButtonRendered = true;
    }

    async function handleGoogleCredentialResponse(response) {
      if (!response || !response.credential) {
        Swal.fire({
          icon: 'warning',
          title: 'ไม่สามารถรับข้อมูลจาก Google ได้',
          text: 'กรุณาลองเข้าสู่ระบบอีกครั้ง',
          confirmButtonColor: '#6366f1',
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
        return;
      }

      Swal.fire({
        title: '⏳ กำลังตรวจสอบผ่าน Google...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading(),
        background: '#1e1b4b',
        color: '#e2e8f0'
      });

      const result = await loginWithGoogle(response.credential);

      if (result.ok) {
        try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
        await Swal.fire({
          icon: 'success',
          title: '✅ เข้าสู่ระบบสำเร็จ',
          text: 'กำลังนำท่านไปยังหน้าที่ต้องการ...',
          timer: 1000,
          showConfirmButton: false,
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
        window.location.replace(destPage);
      } else {
        Swal.fire({
          icon: 'error',
          title: '❌ เข้าสู่ระบบไม่สำเร็จ',
          text: result.error || 'กรุณาตรวจสอบข้อมูลอีกครั้ง',
          confirmButtonText: 'ลองใหม่',
          confirmButtonColor: '#6366f1',
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
      }
    }

    function waitForGoogleScriptReady() {
      if (window.google && google.accounts && google.accounts.id) {
        renderGoogleLogin(true);
        return;
      }
      setTimeout(waitForGoogleScriptReady, 200);
    }

    waitForGoogleScriptReady();

    // ---- ปุ่ม Login ----
    btnLogin.addEventListener('click', async function () {
      if (authMethod !== 'code') { return; }

      const value = adminCode.value;

      if (!normalizeCodeInput(value)) {
        Swal.fire({
          icon: 'warning',
          title: 'กรุณากรอกข้อมูล',
          text: 'กรอกรหัสแอดมินก่อน',
          confirmButtonColor: '#6366f1',
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
        return;
      }

      Swal.fire({
        title: '⏳ กำลังตรวจสอบ...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading(),
        background: '#1e1b4b',
        color: '#e2e8f0'
      });

      const result = await loginWithCode(value);

      if (result.ok) {
        try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
        await Swal.fire({
          icon: 'success',
          title: '✅ เข้าสู่ระบบสำเร็จ',
          text: 'กำลังนำท่านไปยังหน้าที่ต้องการ...',
          timer: 1000,
          showConfirmButton: false,
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
        window.location.replace(destPage);
      } else {
        Swal.fire({
          icon: 'error',
          title: '❌ เข้าสู่ระบบไม่สำเร็จ',
          text: result.error || 'กรุณาตรวจสอบข้อมูลอีกครั้ง',
          confirmButtonColor: '#6366f1',
          background: '#1e1b4b',
          color: '#e2e8f0'
        });
      }
    });
  </script>
</body>
</html>

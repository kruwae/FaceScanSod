<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | ระบบสแกนหน้า</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="auth-badge.js"></script>
  <!-- ES module removed: ใช้ inline getApiUrl() ด้านล่างแทน เพื่อหลีกเลี่ยง CORS/infinite recursion -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient orbs */
    body::before {
      content: '';
      position: fixed;
      width: 420px; height: 420px;
      background: #6366f1;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.13;
      top: -120px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 320px; height: 320px;
      background: #06b6d4;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.09;
      bottom: -80px; right: -80px;
      pointer-events: none; z-index: 0;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 36px 28px 28px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.5s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .lock-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px; height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
      font-size: 34px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.55em;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.88em;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* Destination badge */
    .dest-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(99,102,241,0.14);
      border: 1px solid rgba(99,102,241,0.28);
      color: #c7d2fe;
      font-size: 0.82em;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .login-tab {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      padding: 12px 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.04);
      color: #cbd5e1;
      display: block;
    }

    .login-tab.active {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
    }

    .login-field {
      width: 100%;
      margin-bottom: 14px;
      display: none;
    }

    .login-field.active {
      display: block;
    }

    .login-field input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 15px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      background: rgba(15,23,42,0.35);
      color: #e2e8f0;
      outline: none;
    }

    .login-field input::placeholder {
      color: #64748b;
    }

    .login-field input:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }

    .google-login-wrap {
      width: 100%;
      margin-bottom: 14px;
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 48px;
    }

    .google-login-wrap.active {
      display: flex;
    }

    .google-login-note {
      width: 100%;
      font-size: 0.84em;
      color: #94a3b8;
      line-height: 1.6;
      margin-top: 8px;
      margin-bottom: 6px;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(99,102,241,0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.45);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.85em;
      padding: 8px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
      margin-top: 16px;
    }

    .back-link:hover {
      color: #e2e8f0;
      background: rgba(255,255,255,0.09);
    }

    .security-note {
      margin-top: 20px;
      font-size: 0.76em;
      color: #475569;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .auth-badge-wrap {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="auth-badge-wrap" id="authBadgeHost"></div>

  <div class="login-card" id="loginCard">
    <div class="lock-badge">🔒</div>
    <h1>Admin Only</h1>
    <p class="subtitle">
      หน้านี้สำหรับผู้ดูแลระบบเท่านั้น<br>
      กรุณายืนยันรหัสแอดมินก่อนเข้าใช้งาน
    </p>

    <div class="dest-badge" id="destBadge">🔗 กำลังโหลด...</div>

    <div class="login-tabs">
      <button type="button" class="login-tab active" id="tabCode">เข้าด้วยรหัส</button>
      <button type="button" class="login-tab" id="tabGoogle">เข้าด้วย Gmail</button>
    </div>

    <div class="login-field active" id="fieldCode">
      <input type="text" id="adminUsername" placeholder="ชื่อผู้ใช้ (Username)" autocomplete="username" style="margin-bottom: 12px;">
      <input type="password" id="adminCode" placeholder="รหัสผ่าน" autocomplete="current-password">
    </div>

    <div class="login-field" id="fieldGoogle">
      <div id="googleButton" class="google-login-wrap"></div>
      <div class="google-login-note">ลงชื่อเข้าใช้ด้วยบัญชี Google ที่เป็นอีเมลแอดมินในระบบ</div>
    </div>

    <button class="btn-login" id="btnLogin">🔓 ยืนยันรหัสแอดมิน</button>

    <a href="index.html" class="back-link">← กลับเมนูหลัก</a>

    <div class="security-note">
      🛡️ Session จะหมดอายุเมื่อปิด browser tab — ต้อง login ใหม่ทุกครั้ง
    </div>
  </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    // ============================================================
    //  Admin Login — Central page
    //  SECURITY: ไม่มี hardcoded fallback — ตรวจผ่าน GAS API เท่านั้น
    // ============================================================
    const SESSION_KEY = 'adminAuth';

    const btnLogin  = document.getElementById('btnLogin');
    const destBadge = document.getElementById('destBadge');
    const tabCode   = document.getElementById('tabCode');
    const tabGoogle = document.getElementById('tabGoogle');
    const fieldCode = document.getElementById('fieldCode');
    const adminUsernameInput = document.getElementById('adminUsername');
    const adminCodeInput = document.getElementById('adminCode');
    let authMethod  = 'code';
    const fieldGoogle = document.getElementById('fieldGoogle');
    const adminCode = document.getElementById('adminCode');
    const googleButton = document.getElementById('googleButton');
    let authMethod = 'code';
    let googleClientReady = false;
    let googleButtonRendered = false;

    // ---- อ่าน ?to=... จาก URL เพื่อรู้ว่าจะ redirect ไปหน้าไหน ----
    const params   = new URLSearchParams(window.location.search);
    const destPage = params.get('to') || 'config.html';

    // แสดงปลายทาง
    const destLabel = {
      'config.html':   '⚙️ ตั้งค่าระบบ (config)',
      'register.html': '👤 ลงทะเบียนพนักงาน (register)',
      'report.html':   '📊 รายงานการลงชื่อ (report)',
      'staff.html':    '👥 จัดการพนักงาน (staff)'
    };
    destBadge.textContent = destLabel[destPage] || ('→ ' + destPage);

    function setAuthMethod(method) {
      authMethod = method;
      tabCode.classList.toggle('active', method === 'code');
      tabGoogle.classList.toggle('active', method === 'google');
      fieldCode.classList.toggle('active', method === 'code');
      fieldGoogle.classList.toggle('active', method === 'google');
      if (googleButton) googleButton.classList.toggle('active', method === 'google');
      btnLogin.style.display = method === 'code' ? 'flex' : 'none';
      if (method === 'google') {
        if (!window.google && googlePollCount >= GOOGLE_POLL_MAX) retryGoogleLoad();
        else renderGoogleLogin();
      }
    }

    tabCode.addEventListener('click', () => setAuthMethod('code'));
    tabGoogle.addEventListener('click', () => setAuthMethod('google'));
    setAuthMethod('code');

    // ---- ตรวจสอบ session ----
    function isAuthed() {
      try { return sessionStorage.getItem(SESSION_KEY) === '1'; }
      catch(e) { return false; }
    }

    // ถ้า login อยู่แล้ว → ไปเลย
    if (isAuthed()) { window.location.replace(destPage); }

    // ---- API URL ----
    function getApiUrl() {
      // อ่านตรงจาก localStorage / GAS_API_URL ไม่ผ่าน window.getApiUrl (ป้องกัน infinite recursion)
      try {
        const fromStorage = (
          localStorage.getItem('GAS_API_URL') ||
          localStorage.getItem('gasApiUrl') || ''
        ).trim();
        if (fromStorage) {
          console.log('[DEBUG getApiUrl] source=localStorage value=', fromStorage);
          return fromStorage;
        }
      } catch(e) {
        console.warn('[DEBUG getApiUrl] localStorage blocked:', e);
      }
      const fromWindow = (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '').trim();
      console.log('[DEBUG getApiUrl] source=window.GAS_API_URL value=', fromWindow);
      return fromWindow;
    }

    function normalizeCodeInput(value) {
      return String(value || '')
        .replace(/\u00A0/g, ' ')
        .replace(/\u200B/g, '')
        .replace(/\u200C/g, '')
        .replace(/\u200D/g, '')
        .replace(/\uFEFF/g, '')
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .trim();
    }

    async function loginWithCode(username, code) {
      const trimmedUsername = String(username || '').trim();
      const trimmedCode = normalizeCodeInput(code);
      const apiUrl  = getApiUrl();
      console.log('[loginWithCode] apiUrl:', apiUrl, '| user:', trimmedUsername, '| code length:', trimmedCode.length);

      if (!apiUrl) {
        return { ok: false, error: 'ยังไม่ได้ตั้งค่า API URL — ไปตั้งค่าที่ config.html ก่อน' };
      }

      try {
        const ctrl  = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 18000);

        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', authMethod: 'code', username: trimmedUsername, code: trimmedCode }),
          signal: ctrl.signal,
          redirect: 'follow',
          credentials: 'omit'
        });
        clearTimeout(timer);

        let data;
        try { data = await res.json(); }
        catch(jsonErr) { return { ok: false, error: 'ตอบกลับจาก Server ไม่ถูกต้อง — กรุณาลองใหม่' }; }
        console.log('[loginWithCode] response:', JSON.stringify(data));

        if (data && data.status === 'ok' && data.token) {
          try { localStorage.setItem('token', data.token); } catch (e) {}
          try { localStorage.setItem('readToken', data.readToken || ''); } catch (e) {}
          try { sessionStorage.setItem('adminRole', data.role || data.userRole || 'admin'); } catch (e) {}
          try { sessionStorage.setItem('adminName', data.name || data.username || data.displayName || 'Admin'); } catch (e) {}
          return { ok: true, token: data.token };
        }

        return { ok: false, error: (data && (data.message || data.error)) || 'รหัสไม่ถูกต้อง' };
      } catch (e) {
        console.error('[loginWithCode] fetch error:', e);
        if (e.name === 'AbortError') {
          return { ok: false, error: 'Server ใช้เวลาตอบนานเกินไป (cold start) — กรุณาลองใหม่อีกครั้ง' };
        }
        return { ok: false, error: 'เชื่อมต่อ Server ไม่ได้: ' + e.message };
      }
    }

    async function loginWithGoogle(idToken) {
      const apiUrl = getApiUrl();
      console.log('[loginWithGoogle] apiUrl:', apiUrl, '| idToken present:', !!idToken);
      if (idToken) {
        try {
          const parts = idToken.split('.');
          const pad = s => { while (s.length % 4) s += '='; return s; };
          const payload = JSON.parse(atob(pad(parts[1].replace(/-/g,'+').replace(/_/g,'/'))));
          console.log('[loginWithGoogle] email:', payload.email, '| verified:', payload.email_verified, '| aud:', payload.aud);
        } catch(dbgErr) { console.warn('[loginWithGoogle] decode debug error:', dbgErr); }
      }

      if (!apiUrl) {
        return { ok: false, error: 'ยังไม่ได้ตั้งค่า API URL — ไปตั้งค่าที่ config.html ก่อน' };
      }

      try {
        const ctrl  = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 18000);
        const res   = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', authMethod: 'google', idToken: idToken }),
          signal: ctrl.signal,
          redirect: 'follow',
          credentials: 'omit'
        });
        clearTimeout(timer);

        let data;
        try { data = await res.json(); }
        catch(jsonErr) { return { ok: false, error: 'ตอบกลับจาก Server ไม่ถูกต้อง — กรุณาลองใหม่' }; }
        console.log('[loginWithGoogle] response:', JSON.stringify(data));

        if (data && data.status === 'ok' && data.token) {
          try { localStorage.setItem('token', data.token); } catch (e) {}
          try { localStorage.setItem('readToken', data.readToken || ''); } catch (e) {}
          try { sessionStorage.setItem('adminRole', data.role || data.userRole || 'admin'); } catch (e) {}
          try { sessionStorage.setItem('adminName', data.name || data.username || data.displayName || 'Admin'); } catch (e) {}
          return { ok: true, token: data.token };
        }

        return { ok: false, error: (data && (data.message || data.error)) || 'เข้าสู่ระบบด้วย Google ไม่สำเร็จ' };
      } catch (e) {
        console.error('[loginWithGoogle] fetch error:', e);
        if (e.name === 'AbortError') {
          return { ok: false, error: 'Server ใช้เวลาตอบนานเกินไป (cold start) — กรุณาลองใหม่อีกครั้ง' };
        }
        return { ok: false, error: 'เชื่อมต่อ Server ไม่ได้: ' + e.message };
      }
    }

    function getGoogleClientId() {
      return (
        window.GOOGLE_OAUTH_CLIENT_ID ||
        window.GOOGLE_CLIENT_ID ||
        localStorage.getItem('googleClientId') ||
        ''
      ).trim();
    }

    // --- Google Sign-In ---
    let googlePollCount = 0;
    const GOOGLE_POLL_MAX = 50; // 10 วินาที

    function renderGoogleLogin(force) {
      if (!googleButton) return;

      const clientId = getGoogleClientId();
      if (!clientId) {
        googleButton.innerHTML = '<div style="color:#f87171;font-size:0.88em;padding:12px;line-height:1.7;background:rgba(239,68,68,0.08);border-radius:10px;">⚠️ ยังไม่ได้ตั้งค่า Google Client ID<br><span style="color:#94a3b8;font-size:0.9em;">ตรวจสอบไฟล์ js/api-config.js หรือ localStorage</span></div>';
        googleButtonRendered = false;
        return;
      }

      if (!window.google || !window.google.accounts || !window.google.accounts.id) {
        if (authMethod === 'google') {
          googleButton.innerHTML = '<div style="color:#94a3b8;font-size:0.9em;padding:8px;">⏳ กำลังโหลด Google Sign-In SDK...</div>';
        }
        googleButtonRendered = false;
        return;
      }

      if (!googleClientReady) {
        try {
          window.google.accounts.id.initialize({
            client_id: clientId,
            callback: handleGoogleCredentialResponse,
            auto_select: false,
            cancel_on_tap_outside: true,
            itp_support: true
          });
          googleClientReady = true;
        } catch(initErr) {
          console.error('[Google GSI] initialize error:', initErr);
          googleButton.innerHTML = '<div style="color:#f87171;font-size:0.88em;">❌ เริ่มต้น Google Sign-In ไม่ได้: ' + initErr.message + '</div>';
          return;
        }
      }

      if (googleButtonRendered && !force) return;

      try {
        googleButton.innerHTML = '';
        window.google.accounts.id.renderButton(googleButton, {
          theme: 'outline',
          size: 'large',
          type: 'standard',
          shape: 'pill',
          text: 'signin_with',
          width: Math.min(320, window.innerWidth - 80),
          locale: 'th'
        });
        googleButtonRendered = true;
      } catch(renderErr) {
        console.error('[Google GSI] renderButton error:', renderErr);
        googleButton.innerHTML = '<div style="color:#f87171;font-size:0.88em;">❌ แสดงปุ่ม Google ไม่ได้: ' + renderErr.message + '</div>';
      }
    }

    async function handleGoogleCredentialResponse(response) {
      if (!response || !response.credential) {
        Swal.fire({ icon: 'warning', title: 'ไม่สามารถรับข้อมูลจาก Google ได้', text: 'กรุณาลองใหม่อีกครั้ง', confirmButtonColor: '#6366f1', background: '#1e1b4b', color: '#e2e8f0' });
        return;
      }
      Swal.fire({ title: '⏳ กำลังตรวจสอบผ่าน Google...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1e1b4b', color: '#e2e8f0' });
      const result = await loginWithGoogle(response.credential);
      if (result.ok) {
        try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
        await Swal.fire({ icon: 'success', title: '✅ เข้าสู่ระบบสำเร็จ', text: 'กำลังนำท่านไปยังหน้าที่ต้องการ...', timer: 1200, showConfirmButton: false, background: '#1e1b4b', color: '#e2e8f0' });
        try { window.location.replace(destPage); } catch(e) { window.location.href = destPage; }
      } else {
        Swal.fire({ icon: 'error', title: '❌ เข้าสู่ระบบไม่สำเร็จ', text: result.error || 'กรุณาตรวจสอบข้อมูลอีกครั้ง', confirmButtonText: 'ลองใหม่', confirmButtonColor: '#6366f1', background: '#1e1b4b', color: '#e2e8f0' });
      }
    }

    let gsiPollTimer = null;
    function waitForGoogleScriptReady() {
      if (window.google && window.google.accounts && window.google.accounts.id) {
        console.log('[GSI] SDK ready after', googlePollCount * 200, 'ms');
        renderGoogleLogin(true);
        return;
      }
      googlePollCount++;
      if (googlePollCount >= GOOGLE_POLL_MAX) {
        console.warn('[GSI] SDK failed to load after 10s');
        if (googleButton && authMethod === 'google') {
          googleButton.innerHTML = '<div style="color:#f87171;font-size:0.88em;padding:10px;background:rgba(239,68,68,0.08);border-radius:8px;line-height:1.7;cursor:pointer;" onclick="retryGoogleLoad()">⚠️ โหลด Google Sign-In SDK ไม่สำเร็จ<br><span style="color:#94a3b8;font-size:0.85em;">คลิกเพื่อลองโหลดใหม่ หรือใช้ "เข้าด้วยรหัส" แทน</span></div>';
        }
        return;
      }
      gsiPollTimer = setTimeout(waitForGoogleScriptReady, 200);
    }

    function retryGoogleLoad() {
      googlePollCount = 0;
      if (googleButton) googleButton.innerHTML = '<div style="color:#94a3b8;font-size:0.9em;padding:8px;">⏳ กำลังโหลด Google Sign-In SDK...</div>';
      waitForGoogleScriptReady();
    }

    waitForGoogleScriptReady();

    // ---- ฟังก์ชัน submit รหัส (ใช้ร่วมกันทั้งปุ่มและ Enter) ----
    async function doCodeLogin() {
      if (authMethod !== 'code') return;
      const userValue = adminUsernameInput ? adminUsernameInput.value.trim() : 'admin';
      const codeValue = adminCodeInput ? adminCodeInput.value : '';
      if (!userValue) {
        Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูล', text: 'กรอกชื่อผู้ใช้ก่อน', confirmButtonColor: '#6366f1', background: '#1e1b4b', color: '#e2e8f0' });
        if (adminUsernameInput) adminUsernameInput.focus();
        return;
      }
      if (!normalizeCodeInput(codeValue)) {
        Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูล', text: 'กรอกรหัสแอดมินก่อน', confirmButtonColor: '#6366f1', background: '#1e1b4b', color: '#e2e8f0' });
        if (adminCodeInput) adminCodeInput.focus();
        return;
      }
      Swal.fire({ title: '⏳ กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading(), background: '#1e1b4b', color: '#e2e8f0' });
      const result = await loginWithCode(userValue, codeValue);
      if (result.ok) {
        try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {}
        await Swal.fire({ icon: 'success', title: '✅ เข้าสู่ระบบสำเร็จ', text: 'กำลังนำท่านไปยังหน้าที่ต้องการ...', timer: 1200, showConfirmButton: false, background: '#1e1b4b', color: '#e2e8f0' });
        try { window.location.replace(destPage); } catch(e) { window.location.href = destPage; }
      } else {
        Swal.fire({ icon: 'error', title: '❌ เข้าสู่ระบบไม่สำเร็จ', text: result.error || 'กรุณาตรวจสอบข้อมูลอีกครั้ง', confirmButtonColor: '#6366f1', background: '#1e1b4b', color: '#e2e8f0' });
      }
    }

    // ---- ปุ่ม Login ----
    btnLogin.addEventListener('click', doCodeLogin);

    // ---- กด Enter ในช่อง input ----
    if (adminUsernameInput) {
      adminUsernameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
          e.preventDefault();
          if (adminCodeInput) adminCodeInput.focus();
        }
      });
    }

    if (adminCodeInput) {
      adminCodeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
          e.preventDefault();
          doCodeLogin();
        }
      });
    }
  </script>
</body>
</html>

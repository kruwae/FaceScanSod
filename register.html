<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel - ลงทะเบียนใบหน้า</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <script src="js/api-init.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: #6366f1;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      top: -80px;
      left: -80px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
      display: none;
    }

    .admin-lock {
      width: 100%;
      max-width: 460px;
      margin: 10vh auto 0;
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 22px;
      padding: 28px 22px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      z-index: 1;
    }

    .admin-lock__badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.35);
      font-size: 32px;
      margin-bottom: 16px;
    }

    .admin-lock h2 {
      font-size: 1.5em;
      margin-bottom: 8px;
    }

    .admin-lock p {
      color: #94a3b8;
      font-size: 0.9em;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .admin-lock .btn-admin {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-admin-login {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.28);
    }

    .btn-admin-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(99, 102, 241, 0.4);
    }

    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.88em;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.25s ease;
    }

    .back-btn:hover {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.1);
    }

    .logout-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.88em;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
    }

    h2 {
      font-size: 1.6em;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .instruction {
      font-size: 0.83em;
      color: #64748b;
      line-height: 1.6;
    }

    .step-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 16px 0 20px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #6366f1;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.6);
    }

    #status {
      font-size: 0.88em;
      color: #64748b;
      margin-bottom: 14px;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .video-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid rgba(99, 102, 241, 0.4);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.3);
      background: #0a0a1a;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    video {
      width: 100%;
      display: block;
      transform: scaleX(-1);
      border-radius: 18px;
    }

    .form-section {
      margin-top: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 22px 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 15px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input::placeholder {
      color: #475569;
    }

    .input-group input:focus {
      border-color: rgba(99, 102, 241, 0.6);
      background: rgba(99, 102, 241, 0.06);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    #btnSave {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
    }

    #btnSave:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
    }

    #btnSave:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: #475569;
      box-shadow: none;
      cursor: default;
    }

    .count-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 13px;
    }

    #btnSave:not(:disabled) .count-badge {
      background: rgba(255, 255, 255, 0.25);
    }

    #msg {
      margin-top: 14px;
      min-height: 24px;
      font-size: 0.9em;
      font-weight: 600;
      text-align: center;
    }

    .msg-success {
      color: #34d399;
    }

    .msg-error {
      color: #f87171;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .auth-badge-wrap {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
    }

    @media (max-width: 640px) {
      .header-top {
        flex-direction: column;
        align-items: stretch;
      }

      .back-btn,
      .logout-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <div class="auth-badge-wrap" id="authBadgeHost"></div>

  <div class="admin-lock" id="adminLock">
    <a href="index.html" class="back-btn">← กลับเมนูหลัก</a>
    <div class="admin-lock__badge">🔒</div>
    <h2>Admin Only</h2>
    <p>หน้านี้สำหรับผู้ดูแลระบบเท่านั้น<br>กรุณายืนยันรหัสแอดมินก่อนเข้าใช้งาน</p>
    <button class="btn-admin btn-admin-login" id="btnAdminLogin">🔓 ยืนยันรหัสแอดมิน</button>
  </div>

  <div class="container" id="adminContent">
    <div class="page-header">
      <div class="header-top">
        <a href="index.html" class="back-btn">← กลับ</a>
        <button class="logout-btn" id="btnLogout">🔓 ออกจากระบบ</button>
      </div>
      <h2>👤 ลงทะเบียนใบหน้า</h2>
      <p class="instruction">บันทึก 3 มุม: หน้าตรง / หันซ้ายเล็กน้อย / หันขวาเล็กน้อย<br>เพื่อความแม่นยำสูงสุด</p>
    </div>

    <div class="step-dots">
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>

    <div id="status">
      <span class="spinner"></span> กำลังโหลด AI Model...
    </div>

    <div class="video-wrapper">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="form-section">
      <div class="input-group">
        <input type="text" id="username" placeholder="ชื่อ-นามสกุลพนักงาน" autocomplete="off">
      </div>
      <div class="input-group">
        <input type="text" id="position" placeholder="ตำแหน่ง" autocomplete="off">
      </div>

      <button id="btnSave" onclick="saveFace()" disabled>
        📸 บันทึกใบหน้า <span id="saveCount" class="count-badge">0</span>
      </button>

      <div id="msg"></div>
    </div>
  </div>

  <script src="auth-badge.js"></script>
  <script src="js/api-init.js"></script>
  <script>
    const SESSION_KEY = 'adminAuth';
    const API_URL     = (localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '') || '').trim();

    const adminLock    = document.getElementById('adminLock');
    const adminContent = document.getElementById('adminContent');
    const btnLogout    = document.getElementById('btnLogout');
    const video        = document.getElementById('video');
    const statusDiv    = document.getElementById('status');
    const btnSave      = document.getElementById('btnSave');
    const msgDiv       = document.getElementById('msg');
    const countSpan    = document.getElementById('saveCount');
    const usernameInput = document.getElementById('username');
    const positionInput = document.getElementById('position');

    let saveCounter = 0;
    const MAX_CAPTURES = 3;
    let currentEmployeeId = '';
    let currentLocationName = '';
    let selectedLocationData = null;
    let selectedLocationEditable = false;

    let capturedDescriptors = [];
    const MIN_FACE_DISTANCE = 0.25;
    let lastCaptureTime = 0;
    const MIN_CAPTURE_INTERVAL_MS = 1000;

    function euclideanDistance(d1, d2) {
      let sum = 0;
      for (let i = 0; i < d1.length; i++) {
        const diff = d1[i] - d2[i];
        sum += diff * diff;
      }
      return Math.sqrt(sum);
    }

    function isAuthed() {
      return sessionStorage.getItem(SESSION_KEY) === '1';
    }

    window.addEventListener('pageshow', function (e) {
      if (e.persisted && !isAuthed()) {
        window.location.replace('login.html?to=register.html');
      }
    });

    function doLogout() {
      sessionStorage.removeItem(SESSION_KEY);
      try {
        localStorage.removeItem('token');
        localStorage.removeItem('readToken');
      } catch (e) {}
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
      window.location.replace('login.html?to=register.html');
    }

    btnLogout.addEventListener('click', doLogout);

    if (!isAuthed()) {
      window.location.replace('login.html?to=register.html');
    } else {
      adminLock.style.display = 'none';
      adminContent.style.display = 'block';
      if (!API_URL) {
        statusDiv.innerHTML = '<span style="color:#f87171">❌ ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#fbbf24">ไปตั้งค่าก่อน</a></span>';
      } else {
        // รอให้ DOM และ Scripts โหลดเสร็จก่อน
        if (typeof faceapi !== 'undefined') {
          initModels();
        } else {
          window.addEventListener('load', initModels);
        }
      }
    }

    function updateDots() {
      [1, 2, 3].forEach(i => {
        const dot = document.getElementById('dot' + i);
        dot.className = 'dot' + (i <= saveCounter ? ' active' : '');
      });

      const saveLabel = saveCounter >= MAX_CAPTURES ? 'ครบ 3 มุมแล้ว' : '📸 บันทึกใบหน้า';
      btnSave.disabled = saveCounter >= MAX_CAPTURES;
      btnSave.innerHTML = saveCounter >= MAX_CAPTURES
        ? '✅ บันทึกครบ 3 ครั้ง <span class="count-badge">' + saveCounter + '</span>'
        : saveLabel + ' <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
    }

    async function initModels() {
      try {
        statusDiv.innerHTML = '<span class="spinner"></span> กำลังโหลด AI Model...';
        const MODEL_URL = './models';
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        startCamera();
      } catch (e) {
        statusDiv.innerHTML = '<span style="color:#f87171">❌ โหลด AI Model ล้มเหลว: ' + e.message + '</span>';
      }
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
          video.srcObject = stream;
          statusDiv.innerText = '';
          btnSave.disabled = false;
        })
        .catch(err => {
          statusDiv.innerHTML = '<span style="color:#f87171">❌ เปิดกล้องไม่ได้: ' + err.message + '</span>';
        });
    }

    async function saveFace() {
      const name = usernameInput.value.trim();
      const position = positionInput.value.trim();
      if (!name) return alert('กรุณาใส่ชื่อก่อน');
      if (saveCounter >= MAX_CAPTURES) {
        msgDiv.innerHTML = '<span class="msg-error">❌ บันทึกครบ 3 มุมแล้ว กรุณาเริ่มลงทะเบียนใหม่</span>';
        updateDots();
        return;
      }

      const now = Date.now();
      if (now - lastCaptureTime < MIN_CAPTURE_INTERVAL_MS) {
        msgDiv.innerHTML = '<span class="msg-error">⏳ กรุณารอสักครู่แล้วลองใหม่ (ห่างกันอย่างน้อย 1 วินาที)</span>';
        return;
      }

      if (!isAuthed()) {
        alert('หมดสิทธิ์การเข้าถึง กรุณาเข้าสู่ระบบใหม่');
        doLogout();
        return;
      }

      const currentApiUrl = (localStorage.getItem('gasApiUrl') ||
        (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '') || '').trim();

      if (!currentApiUrl) {
        msgDiv.innerHTML = '<span class="msg-error">❌ ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#fbbf24">ไปตั้งค่าก่อน</a></span>';
        return;
      }

      btnSave.disabled = true;
      btnSave.innerHTML = '⏳ กำลังประมวลผล... <span class="count-badge">' + saveCounter + '</span>';
      msgDiv.innerText = '';

      const SAMPLE_COUNT = 5;
      const capturedSampleDescriptors = [];
      let bestDetection = null;
      let bestFaceScore = -1;

      for (let i = 0; i < SAMPLE_COUNT; i++) {
        const detection = await faceapi
          .detectSingleFace(video)
          .withFaceLandmarks()
          .withFaceDescriptor();

        if (!detection) continue;

        const faceScore = typeof detection.detection.score === 'number' ? detection.detection.score : 0;
        if (faceScore > bestFaceScore) {
          bestFaceScore = faceScore;
          bestDetection = detection;
        }

        capturedSampleDescriptors.push(Array.from(detection.descriptor));
        await new Promise(resolve => setTimeout(resolve, 120));
      }

      if (!capturedSampleDescriptors.length || !bestDetection) {
        msgDiv.innerHTML = '<span class="msg-error">❌ ไม่พบใบหน้า! กรุณามองกล้องให้ชัดเจน แล้วลองใหม่</span>';
        btnSave.disabled = false;
        btnSave.innerHTML = '📸 บันทึกใบหน้า <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
        return;
      }

      const descriptorArray = capturedSampleDescriptors.reduce((acc, arr) => {
        for (let i = 0; i < acc.length; i++) acc[i] += Number(arr[i] || 0);
        return acc;
      }, new Array(bestDetection.descriptor.length).fill(0)).map(v => v / capturedSampleDescriptors.length);

      const quantizedDescriptor = descriptorArray.map(v => Math.round(Number(v) * 1000) / 1000);

      if (capturedDescriptors.length > 0) {
        let minDist = 999;
        for (const prev of capturedDescriptors) {
          const dist = euclideanDistance(descriptorArray, prev);
          if (dist < minDist) minDist = dist;
        }

        if (minDist < MIN_FACE_DISTANCE) {
          const hints = ['หันซ้ายเล็กน้อย', 'หันขวาเล็กน้อย', 'เงยหน้าหรือก้มเล็กน้อย'];
          const hint = hints[saveCounter - 1] || 'ขยับหน้าให้ต่างจากเดิม';
          msgDiv.innerHTML = `<span class="msg-error">⚠️ ใบหน้ามุมนี้คล้ายกับที่บันทึกไปแล้วมาก (ระยะห่าง ${minDist.toFixed(3)})<br>กรุณา${hint} แล้วลองอีกครั้ง</span>`;
          btnSave.disabled = false;
          btnSave.innerHTML = '📸 บันทึกเพิ่ม <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
          return;
        }
      }

      lastCaptureTime = Date.now();

      try {
        const resolvedEmployeeId = currentEmployeeId || ('EMP-' + String(Date.now()).slice(-6));
        const res = await fetch(currentApiUrl, {
          method: 'POST',
          body: JSON.stringify({
            action: 'registerUser',
            name,
            position,
            faceDescriptor: quantizedDescriptor,
            registeredBy: 'admin',
            status: 'active',
            roles: ['admin', 'employee'],
            role: 'admin',
            employeeId: resolvedEmployeeId
          })
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);
        if (data.employeeId) currentEmployeeId = data.employeeId;

        capturedDescriptors.push(descriptorArray);
        saveCounter = Math.min(saveCounter + 1, MAX_CAPTURES);
        document.getElementById('saveCount') && (document.getElementById('saveCount').innerText = saveCounter);
        updateDots();

        const angleNames = ['หน้าตรง', 'มุมที่สอง (หันซ้าย/ขวา)', 'มุมที่สาม (หันอีกด้าน)'];
        const nextHints = ['หันซ้ายเล็กน้อยแล้วกดอีกครั้ง', 'หันขวาเล็กน้อยแล้วกดอีกครั้ง', ''];

        msgDiv.innerHTML = saveCounter >= MAX_CAPTURES
          ? '<span class="msg-success">✅ บันทึกครบ 3 มุมแล้ว ลงทะเบียนสำเร็จ!</span>'
          : `<span class="msg-success">✅ บันทึก${angleNames[saveCounter - 1]}สำเร็จ! ${nextHints[saveCounter - 1]}</span>`;

        if (saveCounter < MAX_CAPTURES) {
          btnSave.disabled = false;
          btnSave.innerHTML = '📸 บันทึกเพิ่ม <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
        } else {
          btnSave.disabled = true;
          btnSave.innerHTML = '✅ บันทึกครบ 3 ครั้ง <span class="count-badge">' + saveCounter + '</span>';
        }
      } catch (e) {
        msgDiv.innerHTML = '<span class="msg-error">❌ บันทึกล้มเหลว: ' + e.message + '</span>';
        updateDots();
        btnSave.disabled = false;
        btnSave.innerHTML = '📸 บันทึกใบหน้า <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
      }
    }

    renderAuthBadge('authBadgeHost');

    document.addEventListener('DOMContentLoaded', () => renderAuthBadge('authBadgeHost'));
  </script>
</body>

</html>

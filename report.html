<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>📊 รายงานการลงชื่อเข้าออก</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const GAS_API_URL = localStorage.getItem('gasApiUrl') || '';
    
    function formatTimeHms(timeStr) {
      if (!timeStr || timeStr === '-') return '-';
      return timeStr;
    }

    function getApiUrl() {
      return (window.GAS_API_URL || localStorage.getItem('gasApiUrl') || '').trim();
    }
    function getToken() { return localStorage.getItem('token') || ''; }
    function getUsername() { return localStorage.getItem('username') || 'Admin'; }
    function getRole() { return localStorage.getItem('role') || ''; }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      localStorage.removeItem('role');
      window.location.href = 'login.html';
    }

    function goBack() { window.history.back(); }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07071a;
      --surface: #0f0f2d;
      --card: #131330;
      --border: rgba(99,102,241,0.18);
      --accent: #6366f1;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
      position: relative;
    }
    body::before {
      content: ''; position: fixed; width: 420px; height: 420px; background: #6366f1; border-radius: 50%; filter: blur(100px); opacity: 0.09; top: -120px; left: -100px; pointer-events: none; z-index: 0;
    }
    .page-wrap { width: 100%; max-width: 1100px; position: relative; z-index: 1; }
    .topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 0 18px; margin-bottom: 10px; }
    .topbar-title { font-size: 1.2em; font-weight: 700; color: #c7d2fe; }
    .topbar-btns { display: flex; gap: 10px; }
    .topbar-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; font-family: inherit; font-size: 0.88em; font-weight: 600; cursor: pointer; transition: all 0.25s; }
    .topbar-btn:hover { background: rgba(255,255,255,0.1); }
    .topbar-btn.logout { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #fca5a5; }

    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 700px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    .sum-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 14px; text-align: center; }
    .sum-num { font-size: 2em; font-weight: 800; margin: 4px 0; color: var(--accent); }
    .sum-label { font-size: 0.78em; color: var(--muted); font-weight: 600; }
    .sum-card.green .sum-num { color: #34d399; }
    .sum-card.yellow .sum-num { color: #fcd34d; }
    .sum-card.red .sum-num { color: #fca5a5; }

    .filter-bar { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.78em; color: var(--muted); font-weight: 600; }
    .filter-input { padding: 10px 14px; background: rgba(99,102,241,0.07); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: 0.9em; outline: none; }
    .btn-filter { border: none; background: linear-gradient(135deg, var(--accent), #818cf8); color: white; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .btn-export { border: 1px solid rgba(16,185,129,0.3); background: rgba(16,185,129,0.1); color: #34d399; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }

    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; min-width: 800px; }
    th { padding: 12px 14px; text-align: left; background: rgba(99,102,241,0.06); color: var(--muted); font-weight: 700; border-bottom: 1px solid var(--border); }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .td-name { font-weight: 700; color: #c7d2fe; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: 700; }
    .badge-ontime { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-late { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .badge-absent { background: rgba(239,68,68,0.15); color: #fca5a5; }

    #loadingOverlay { position: fixed; inset: 0; background: rgba(7,7,26,0.8); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="margin-top:16px; color:var(--accent)">กำลังโหลดข้อมูล...</p>
</div>

<div class="page-wrap">
  <div class="topbar">
    <div class="topbar-title">📊 รายงานการลงชื่อเข้าออก</div>
    <div class="topbar-btns">
      <button class="topbar-btn" onclick="goBack()">⬅️ กลับ</button>
      <button class="topbar-btn logout" onclick="logout()">🚪 ออกจากระบบ</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="sum-card"><div class="sum-num" id="sumTotal">0</div><div class="sum-label">ทั้งหมด</div></div>
    <div class="sum-card green"><div class="sum-num" id="sumOnTime">0</div><div class="sum-label">มาตรงเวลา</div></div>
    <div class="sum-card yellow"><div class="sum-num" id="sumLate">0</div><div class="sum-label">มาสาย</div></div>
    <div class="sum-card red"><div class="sum-num" id="sumAbsent">0</div><div class="sum-label">ขาด/ไม่ระบุ</div></div>
  </div>

  <div class="filter-bar">
    <div class="filter-row">
      <div class="filter-group">
        <label>วันที่เริ่มต้น</label>
        <input type="date" id="filterStart" class="filter-input">
      </div>
      <div class="filter-group">
        <label>วันที่สิ้นสุด</label>
        <input type="date" id="filterEnd" class="filter-input">
      </div>
      <div class="filter-group">
        <label>ค้นหาชื่อ</label>
        <input type="text" id="filterName" class="filter-input" placeholder="ระบุชื่อพนักงาน...">
      </div>
      <button class="btn-filter" onclick="loadReport()">🔍 ค้นหาข้อมูล</button>
      <button class="btn-export" onclick="exportToPdf()">📄 ส่งออก PDF</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="reportTable">
      <thead>
        <tr>
          <th>ลำดับ</th>
          <th>ชื่อ-นามสกุล</th>
          <th>วันที่</th>
          <th>เวลาเข้า</th>
          <th>เวลาออก</th>
          <th>สถานที่</th>
          <th>สถานะ</th>
        </tr>
      </thead>
      <tbody id="reportBody">
        <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted)">กรุณาเลือกช่วงวันที่และกดค้นหา</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  async function init() {
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
    document.getElementById('filterStart').value = firstDay.toISOString().split('T')[0];
    document.getElementById('filterEnd').value = now.toISOString().split('T')[0];

    if (!getToken()) {
      alert('กรุณาเข้าสู่ระบบก่อนใช้งาน');
      window.location.href = 'login.html';
      return;
    }

    await loadReport();
  }

  async function loadReport() {
    const apiUrl = getApiUrl();
    const token = getToken();
    const start = document.getElementById('filterStart').value;
    const end = document.getElementById('filterEnd').value;
    const nameFilter = document.getElementById('filterName').value.trim();

    if (!apiUrl) return alert('❌ ยังไม่ได้ตั้งค่า API URL');
    if (!start || !end) return alert('⚠️ กรุณาเลือกช่วงวันที่');

    document.getElementById('loadingOverlay').style.display = 'flex';

    try {
      const params = new URLSearchParams();
      params.set('action', 'getAttendanceLogs');
      params.set('token', token);
      params.set('startDate', start);
      params.set('endDate', end);
      if (nameFilter) params.set('name', nameFilter);
      params.set('_ts', Date.now().toString());

      const response = await fetch(`${apiUrl}?${params.toString()}`, {
        method: 'GET',
        cache: 'no-store'
      });

      const result = await response.json();

      if (!response.ok) {
        throw new Error(result.message || `HTTP ${response.status}`);
      }

      if (result && result.status === 'error') {
        throw new Error(result.message || 'Unknown server error');
      }

      const logs = Array.isArray(result)
        ? result
        : Array.isArray(result.data)
          ? result.data
          : Array.isArray(result.logs)
            ? result.logs
            : Array.isArray(result.result)
              ? result.result
              : [];

      // --- LOGIC แก้ไขการแสดงผลเวลาเข้า-ออก ---
      const groupedLogs = [];
      const map = new Map();

      logs.forEach(log => {
        const name = log.name || log.Name || '-';
        const date = log.date || log.Date || '-';
        const key = `${name}_${date}`;

        if (!map.has(key)) {
          // ถ้ายังไม่มีข้อมูลของคนนี้ในวันนี้ ให้สร้างแถวใหม่ (เป็นเวลาเข้างาน)
          const newLog = { ...log };
          // กำหนดเวลาเข้างาน
          newLog.displayIn = log.time || log.Time || log.checkinTime || log.checkInTime || '-';
          // กำหนดเวลาออกงาน (ถ้ามีข้อมูล checkout มาอยู่แล้วให้ใช้เลย ถ้าไม่มีให้เป็น -)
          newLog.displayOut = log.checkoutTime || log.checkOutTime || log.checkout || log.outTime || '-';
          
          map.set(key, newLog);
          groupedLogs.push(newLog);
        } else {
          // ถ้ามีข้อมูลอยู่แล้ว (ครั้งที่ 2 ของวัน) ให้เอาเวลาไปใส่ในช่อง "เวลาออกงาน"
          const existingLog = map.get(key);
          const secondTime = log.time || log.Time || log.checkinTime || log.checkInTime || '-';
          
          // ถ้าช่องเวลาออกงานยังว่างอยู่ ให้ใส่เวลาครั้งที่ 2 ลงไป
          if (existingLog.displayOut === '-' || !existingLog.displayOut) {
            existingLog.displayOut = secondTime;
          }
        }
      });

      renderTable(groupedLogs);
      updateSummary(groupedLogs);

    } catch (e) {
      alert('❌ โหลดข้อมูลล้มเหลว: ' + e.message);
      document.getElementById('reportBody').innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--red)">⚠️ ไม่สามารถโหลดข้อมูลได้: ${e.message}</td></tr>`;
    } finally {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  }

  function renderTable(logs) {
    const body = document.getElementById('reportBody');
    if (logs.length === 0) {
      body.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted)">📭 ไม่พบข้อมูลในช่วงที่เลือก</td></tr>';
      return;
    }

    body.innerHTML = logs.map((log, i) => {
      const status = log.status || log.Status || (log.displayIn !== '-' ? 'ปกติ' : 'ไม่ระบุ');
      let badgeClass = 'badge-ontime';
      if (status.includes('สาย')) badgeClass = 'badge-late';
      if (status.includes('ขาด') || status.includes('ไม่ระบุ')) badgeClass = 'badge-absent';

      return `
        <tr>
          <td style="color:var(--muted)">${i + 1}</td>
          <td class="td-name">${log.name || log.Name || '-'}</td>
          <td>${log.date || log.Date || '-'}</td>
          <td style="color:var(--accent); font-family:monospace">${formatTimeHms(log.displayIn)}</td>
          <td style="font-family:monospace">${formatTimeHms(log.displayOut)}</td>
          <td style="font-size:0.9em; color:var(--muted)">${log.locationName || log.Location || '-'}</td>
          <td><span class="badge ${badgeClass}">${status}</span></td>
        </tr>
      `;
    }).join('');
  }

  function updateSummary(logs) {
    document.getElementById('sumTotal').innerText = logs.length;
    const onTime = logs.filter(l => (l.status || '').includes('ปกติ')).length;
    const late = logs.filter(l => (l.status || '').includes('สาย')).length;
    const absent = logs.length - onTime - late;

    document.getElementById('sumOnTime').innerText = onTime;
    document.getElementById('sumLate').innerText = late;
    document.getElementById('sumAbsent').innerText = absent;
  }

  function exportToPdf() {
    const element = document.getElementById('reportTable');
    const opt = {
      margin: 10,
      filename: `Attendance_Report_${new Date().toISOString().split('T')[0]}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, backgroundColor: '#07071a' },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    };
    html2pdf().set(opt).from(element).save();
  }

  init();
</script>
</body>
</html>

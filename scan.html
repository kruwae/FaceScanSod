<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สแกน</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js" defer></script>

<style>
body{
  font-family:'Sarabun',sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  display:flex;
  justify-content:center;
  padding:20px;
}
.container{max-width:500px;width:100%}
h1{text-align:center;margin-bottom:10px}
.status{text-align:center;margin-bottom:10px;color:#94a3b8}
button{
  width:100%;padding:14px;border:none;border-radius:12px;
  margin-top:10px;font-weight:bold;cursor:pointer
}
#btnStart{background:#6366f1;color:#fff}
#btnReload{background:#ef4444;color:#fff}
video{width:100%;border-radius:16px;margin-top:10px}
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  justify-content:center;align-items:center;
}
.modal-box{
  background:#1e293b;padding:20px;border-radius:16px;
  text-align:center;width:90%;max-width:300px
}
</style>
</head>

<body>

<div class="container">
  <h1>📷 สแกนเข้างาน</h1>

  <div class="status" id="status">⏳ กำลังโหลด...</div>

  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
    <button id="btnStart" onclick="startSelectedAction()">📷 สแกนเข้างาน</button>
    <button id="btnCheckOut" onclick="startCamera('logCheckout')" style="background: linear-gradient(135deg, #f59e0b, #d97706);">🚪 สแกนเลิกงาน</button>
    <button id="btnReload" onclick="location.reload()">🔄 รีโหลด</button>
  </div>

  <video id="video" autoplay muted playsinline></video>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2 id="modalName">...</h2>
    <p id="modalTime"></p>
    <button id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button onclick="closeModal()">❌ ยกเลิก</button>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const API_URL = localStorage.getItem('gasApiUrl') || '';
const MATCH_THRESHOLD = 0.45;
const DEFAULT_LOCATION_NAME = '📍 ไม่จำกัดพื้นที่';

/* ================= STATE ================= */
let knownFaces = [];
let currentMatch = null;
let currentLat = null;
let currentLng = null;
let currentLocation = null;
let currentAction = 'logAttendance';
let scanIntervalId = null;
let currentUserHistory = null;
let gpsRangeAllowed = false;
let selectedLocation = null;
let currentLocationLabel = DEFAULT_LOCATION_NAME;
let pendingAttendancePayload = null;

/* ================= DOM ================= */
const statusEl = document.getElementById('status');
const video = document.getElementById('video');

/* ================= UTILS ================= */
function setStatus(msg,color='#94a3b8'){
  statusEl.innerText=msg;
  statusEl.style.color=color;
}

/* ================= GPS ================= */
async function getLocation(){
  return new Promise((resolve,reject)=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      currentLat=pos.coords.latitude;
      currentLng=pos.coords.longitude;
      currentLocationLabel = DEFAULT_LOCATION_NAME;
      gpsRangeAllowed = true;
      resolve();
    },err=>{
      reject(err);
    },{enableHighAccuracy:true});
  });
}

/* ================= FACE ================= */
async function initFace(){
  const MODEL_URL='https://justadudewhohacks.github.io/face-api.js/models';

  await Promise.all([
    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ]);

  const res=await fetch(API_URL+'?action=getKnownFaces');
  const data=await res.json();

  knownFaces=data.map(u=>({
    name:u.name || u.label || 'unknown',
    descriptor:new Float32Array(u.descriptor)
  }));

  gpsRangeAllowed = true;
}

/* ================= MATCH ================= */
function findMatch(query){
  let best={name:'unknown',distance:1};

  knownFaces.forEach(u=>{
    const d=faceapi.euclideanDistance(query,u.descriptor);
    if(d<best.distance) best={name:u.name,distance:d};
  });

  return best;
}

async function fetchUserHistory(employeeId){
  try{
    const res = await fetch(API_URL+'?action=getUserHistory&employeeId='+encodeURIComponent(employeeId));
    return await res.json();
  }catch(_){
    return null;
  }
}

/* ================= CAMERA ================= */
async function startCamera(actionType='logAttendance'){
  currentAction = actionType;
  if (!gpsRangeAllowed) {
    setStatus('⛔ กรุณาตรวจ GPS หรือเลือกพื้นที่ก่อนเริ่มสแกน', '#f87171');
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream;
    await video.play();

    setStatus(actionType === 'logCheckout' ? '🚪 กำลังสแกนลงชื่อออก...' : '📷 กำลังสแกนลงชื่อเข้างาน...', '#34d399');

    if (scanIntervalId) clearInterval(scanIntervalId);
    scanIntervalId = setInterval(scanLoop,500);

  }catch(e){
    setStatus('❌ เปิดกล้องไม่ได้');
  }
}

/* ================= SCAN ================= */
async function scanLoop(){
  const detection=await faceapi
    .detectSingleFace(video)
    .withFaceLandmarks()
    .withFaceDescriptor();

  if(!detection) return;

  const best=findMatch(detection.descriptor);

  if(best.distance < MATCH_THRESHOLD){
    currentMatch=best.name;
    showModal(best);
  }
}

/* ================= MODAL ================= */
function showModal(match){
  document.getElementById('modalName').innerText=match.name;

  const now=new Date();
  document.getElementById('modalTime').innerText=
    currentAction === 'logCheckout'
      ? 'เวลาออกงาน: ' + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.'
      : 'เวลาเข้างาน: ' + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';

  const confirmBtn = document.getElementById('btnConfirm');
  if (confirmBtn) {
    confirmBtn.innerText = currentAction === 'logCheckout' ? '✅ ยืนยันออกงาน' : '✅ ยืนยันเข้างาน';
    confirmBtn.style.background = currentAction === 'logCheckout'
      ? 'linear-gradient(135deg, #f59e0b, #d97706)'
      : 'linear-gradient(135deg, #10b981, #059669)';
  }

  document.getElementById('modal').style.display='flex';
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

/* ================= API ================= */
async function confirmAttendance(){
  try{
    const payload = pendingAttendancePayload || {
      action:currentAction,
      name:currentMatch,
      lat:currentLat,
      lng:currentLng,
      locationName:currentLocationLabel,
      gpsStatus:'ok'
    };

    const res = await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    const data = await res.json().catch(() => ({}));
    if (data && data.status === 'error') {
      alert(data.message || '❌ บันทึกล้มเหลว');
      return;
    }

    alert('✅ บันทึกสำเร็จ');
    location.reload();

  }catch(e){
    alert('❌ บันทึกล้มเหลว');
  }
}

/* ================= INIT ================= */
async function init(){
  try{
    if(!API_URL){
      setStatus('❌ ยังไม่ได้ตั้งค่า API');
      return;
    }

    setStatus('1/3 โหลด AI...');
    await initFace();

    setStatus('2/3 ตรวจ GPS...');
    await getLocation();

    setStatus('✅ พร้อมใช้งาน','#34d399');

  }catch(e){
    setStatus('❌ ระบบโหลดไม่สำเร็จ');
  }
}

/* ================= EVENTS ================= */
document.getElementById('btnStart').onclick=()=>startSelectedAction();
document.getElementById('btnCheckOut').onclick=()=>startCamera('logCheckout');
function startSelectedAction(){ startCamera('logAttendance'); }

document.addEventListener('DOMContentLoaded',init);
</script>

</body>
</html>

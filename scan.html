<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="meshService.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f0f23 0%, #0d1b2a 60%, #0a0f1e 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 50px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: #10b981;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
      bottom: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 16px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 0.85em;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.25s ease;
    }

    .back-btn:hover {
      color: #e2e8f0;
      background: rgba(255,255,255,0.1);
    }

    h2 {
      font-size: 1.1em;
      font-weight: 600;
      color: #c7d2fe;
    }

    .spacer { width: 80px; }

    .status-area {
      width: 100%;
      text-align: center;
      margin-bottom: 14px;
    }

    #main-status {
      font-size: 0.9em;
      color: #94a3b8;
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #gps-status {
      font-size: 0.8em;
      color: #475569;
      margin-top: 6px;
      min-height: 18px;
    }

    .gps-alert {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.35);
      color: #fca5a5;
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      margin-bottom: 8px;
      font-size: 0.88em;
      font-weight: 600;
      text-align: center;
    }

    .gps-permission-banner {
      display: none;
      width: 100%;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 0.82em;
      color: #fcd34d;
      text-align: center;
    }

    .location-selector {
      display: none;
      width: 100%;
      margin-bottom: 10px;
    }

    .location-selector label {
      display: block;
      font-size: 0.8em;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .location-selector select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
    }

    .gps-info-card {
      display: none;
      width: 100%;
      margin-bottom: 12px;
      background: rgba(16,185,129,0.07);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.8em;
      line-height: 1.8;
    }

    .gps-info-card.out-range {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.3);
    }

    .video-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #060612;
      min-height: 280px;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s ease;
      border-radius: 20px;
    }

    video.active { opacity: 1; }

    .scanner-frame {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #10b981;
      border-style: solid;
      opacity: 0.8;
    }

    .corner-tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .scan-line {
      display: none;
      position: absolute;
      left: 8%;
      right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #10b981, transparent);
      box-shadow: 0 0 8px rgba(16,185,129,0.8);
      z-index: 6;
      animation: scanMove 2s ease-in-out infinite;
    }

    .scan-line.active { display: block; }

    #overlay-status {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      color: #e2e8f0;
      padding: 6px 18px;
      border-radius: 30px;
      z-index: 10;
      white-space: nowrap;
      font-size: 0.84em;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #btnStart {
      display: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 44px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      box-shadow: 0 4px 25px rgba(99,102,241,0.45);
      margin: 20px auto 0;
      transition: all 0.3s ease;
    }

    #btnStart:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 35px rgba(99,102,241,0.6);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: linear-gradient(160deg, #1e1e3f 0%, #16213e 100%);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 32px 28px;
      border-radius: 24px;
      width: 88%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-avatar {
      font-size: 52px;
      background: rgba(99,102,241,0.15);
      border: 2px solid rgba(99,102,241,0.3);
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .user-name {
      font-size: 24px;
      color: #a5b4fc;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .time-badge {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #34d399;
      padding: 8px 22px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .loc-badge {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.25);
      color: #a5b4fc;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
      margin: 5px 0;
      font-family: 'Sarabun', sans-serif;
      transition: all 0.25s ease;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 17px;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(16,185,129,0.35);
    }

    .btn-cancel {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
    }

    @keyframes scanMove {
      0% { top: 12%; }
      50% { top: 82%; }
      100% { top: 12%; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <h2>📷 สแกนเข้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="status-area" id="statusAreaRoot">
    <div id="main-status">⏳ กำลังเตรียมระบบ...</div>
    <div id="gps-status"></div>
  </div>

  <div id="gps-alert-box" class="gps-alert"></div>
  <div id="gpsPermBanner" class="gps-permission-banner">📱 บราวเซอร์กำลังขอสิทธิ์ GPS — กรุณากด <strong style="color:#fbbf24">Allow</strong></div>
  <div id="gpsGuide" class="gps-guide"></div>

  <!-- เลือกหน่วยบริการ + ปุ่มเปลี่ยน -->
  <div class="location-selector" id="locationSelector">
    <label>🏥 เลือกหน่วยบริการ</label>
    <select id="locationSelect"></select>
    <button id="btnConfirmLocation" type="button">✅ ยืนยันหน่วยบริการ → ตรวจสอบ GPS</button>
    <button id="btnChangeLocation" type="button" style="margin-top:8px; background:#64748b; color:white; display:none; width:100%; padding:12px;">🔄 เปลี่ยนหน่วยบริการ</button>
  </div>

  <div class="gps-info-card" id="gpsInfoCard"></div>

  <button id="btnStart" onclick="startCamera()">📷 แตะเพื่อเริ่มสแกน</button>

  <div class="video-container">
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div id="overlay-status">รอโหลด...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>
</div>

<!-- Modal ยืนยัน -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-avatar">🙋</div>
    <p class="modal-title">ตรวจพบบุคคล</p>
    <div class="user-name" id="modalName">...</div>
    <div id="modalTime" class="time-badge">00:00</div>
    <div id="modalLocation" class="loc-badge" style="display:none"></div>
    <div id="modalScore" class="score-text"></div>
    <button class="btn btn-confirm" id="btnConfirm">✅ ยืนยันเข้างาน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน</button>
  </div>
</div>

<script>
  // ====================== ตัวแปรหลัก ======================
  const API_URL = (localStorage.getItem('gasApiUrl') || window.GAS_API_URL || '').trim();
  const video = document.getElementById('video');
  let knownFaces = [];
  let currentLocation = null;
  let currentLat = null;
  let currentLng = null;
  let faceSystemInitialized = false;
  let scanInterval = null;
  let currentMatch = null;
  let allLocations = [];
  const MATCH_THRESHOLD = 0.45;

  // ====================== โหลดข้อมูลพนักงาน ======================
  async function loadKnownFaces() {
    if (!API_URL) return false;
    try {
      const token = localStorage.getItem('readToken') || '';
      const url = `${API_URL}?action=getKnownFaces${token ? '&token=' + encodeURIComponent(token) : ''}`;
      const res = await fetch(url);
      const data = await res.json();

      if (Array.isArray(data) && data.length > 0) {
        knownFaces = data.map(u => ({
          name: u.name || u.label || u.employeeId || 'ไม่ระบุ',
          descriptor: new Float32Array(u.descriptor)
        }));
        return true;
      } else {
        document.getElementById('main-status').innerHTML = '⚠️ ไม่พบข้อมูลพนักงานในระบบ<br>กรุณาไปลงทะเบียนที่เมนู Admin';
        document.getElementById('main-status').style.color = '#f87171';
        return false;
      }
    } catch (e) {
      document.getElementById('main-status').innerHTML = '❌ ไม่สามารถโหลดข้อมูลพนักงานได้';
      document.getElementById('main-status').style.color = '#f87171';
      return false;
    }
  }

  // ====================== โหลด AI Model + Known Faces ======================
  async function initFaceSystem() {
    if (faceSystemInitialized) return;
    document.getElementById('main-status').innerText = 'กำลังโหลดระบบสแกนใบหน้า...';

    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);

      const hasFaces = await loadKnownFaces();
      if (hasFaces) {
        faceSystemInitialized = true;
        document.getElementById('btnStart').style.display = 'inline-block';
        document.getElementById('main-status').innerHTML = '✅ ระบบพร้อมใช้งาน — แตะเพื่อสแกน';
        document.getElementById('main-status').style.color = '#34d399';
      }
    } catch (e) {
      document.getElementById('main-status').innerHTML = '❌ โหลดระบบสแกนใบหน้าไม่สำเร็จ<br>กรุณารีเฟรชหน้า';
      document.getElementById('main-status').style.color = '#f87171';
    }
  }

  // ====================== เริ่มสแกน ======================
  function startCamera() {
    if (!faceSystemInitialized) {
      alert('ระบบยังไม่พร้อม กรุณารอสักครู่');
      return;
    }
    if (allLocations.length > 0 && !currentLocation) {
      alert('กรุณาเลือกหน่วยบริการก่อนเริ่มสแกน');
      return;
    }

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('main-status').innerText = 'กำลังเปิดกล้อง...';

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        document.getElementById('scanLine').classList.add('active');
        document.getElementById('overlay-status').innerText = 'มองกล้องเพื่อสแกน';
        startScanLoop();
      })
      .catch(err => {
        alert('เปิดกล้องไม่ได้: ' + err.message);
        document.getElementById('btnStart').style.display = 'inline-block';
      });
  }

  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (!detection) return;

      let best = { name: 'unknown', distance: 1.0 };
      knownFaces.forEach(u => {
        const d = faceapi.euclideanDistance(detection.descriptor, u.descriptor);
        if (d < best.distance) best = { name: u.name, distance: d };
      });

      if (best.distance < MATCH_THRESHOLD) {
        clearInterval(scanInterval);
        document.getElementById('scanLine').classList.remove('active');
        showConfirmModal(best.name, best.distance);
      }
    }, 600);
  }

  function showConfirmModal(name, distance) {
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalTime').innerText = 'เวลา: ' + new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('modalScore').innerText = 'ความเหมือน: ' + ((1 - distance) * 100).toFixed(1) + '%';
    
    const locEl = document.getElementById('modalLocation');
    if (currentLocation) {
      locEl.innerText = '📍 ' + currentLocation.name;
      locEl.style.display = 'block';
    }

    document.getElementById('confirmModal').style.display = 'flex';
    document.getElementById('btnConfirm').onclick = () => confirmAttendance(name);
  }

  async function confirmAttendance(name) {
    const btn = document.getElementById('btnConfirm');
    btn.disabled = true;
    btn.innerText = 'กำลังบันทึก...';

    const payload = {
      action: 'logAttendance',
      name: name,
      lat: currentLat || '',
      lng: currentLng || '',
      locationName: currentLocation ? currentLocation.name : '',
      gpsStatus: currentLocation ? 'ok' : 'skipped'
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      alert(data.message || 'บันทึกเวลาเข้างานสำเร็จ');
      window.location.replace('index.html');
    } catch (e) {
      alert('บันทึกล้มเหลว: ' + e.message);
      btn.disabled = false;
      btn.innerText = '✅ ยืนยันเข้างาน';
    }
  }

  function cancelAttendance() {
    document.getElementById('confirmModal').style.display = 'none';
    if (scanInterval) clearInterval(scanInterval);
    document.getElementById('btnStart').style.display = 'inline-block';
  }

  // ====================== เริ่มต้นระบบ ======================
  async function init() {
    if (!API_URL) {
      document.getElementById('main-status').innerHTML = '❌ ยังไม่ได้ตั้งค่า API URL<br>กรุณาไปที่เมนูตั้งค่าระบบ';
      return;
    }

    // โหลดรายชื่อหน่วยบริการ
    try {
      const config = await fetch(API_URL + '?action=getConfig').then(r => r.json());
      allLocations = Array.isArray(config.locations) ? config.locations : [];

      if (allLocations.length > 0) {
        const select = document.getElementById('locationSelect');
        allLocations.forEach(loc => {
          const opt = document.createElement('option');
          opt.textContent = loc.name;
          opt.dataset.locJson = JSON.stringify(loc);
          select.appendChild(opt);
        });
        document.getElementById('locationSelector').style.display = 'block';
      }
    } catch (e) {
      console.error('โหลด locations ล้มเหลว', e);
    }

    // โหลดระบบสแกนใบหน้า
    await initFaceSystem();

    // ปุ่มยืนยันหน่วยบริการ
    document.getElementById('btnConfirmLocation').onclick = () => {
      const selectedOpt = document.getElementById('locationSelect').selectedOptions[0];
      if (!selectedOpt) return alert('กรุณาเลือกหน่วยบริการ');
      currentLocation = JSON.parse(selectedOpt.dataset.locJson);
      document.getElementById('btnConfirmLocation').style.display = 'none';
      document.getElementById('btnChangeLocation').style.display = 'block';
      document.getElementById('main-status').innerText = '✅ เลือกหน่วยบริการแล้ว — แตะเพื่อสแกน';
    };

    // ปุ่มเปลี่ยนหน่วยบริการ
    document.getElementById('btnChangeLocation').onclick = () => {
      currentLocation = null;
      document.getElementById('btnConfirmLocation').style.display = 'block';
      document.getElementById('btnChangeLocation').style.display = 'none';
      document.getElementById('gpsInfoCard').style.display = 'none';
    };
  }

  // เริ่มทำงานเมื่อโหลดหน้า
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>

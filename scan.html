<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FaceScanSod - Vercel Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/api-config.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h2 {
      font-size: 1.2em;
      margin-bottom: 16px;
      text-align: center;
      color: #818cf8;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      font-family: inherit;
      font-size: 1em;
      outline: none;
    }

    .gps-box {
      padding: 16px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 16px;
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85em;
      margin-bottom: 6px;
    }

    .gps-label {
      color: #94a3b8;
    }

    .gps-value {
      color: #f1f5f9;
      font-weight: 600;
    }

    .gps-status-msg {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9em;
      font-weight: 600;
      margin-top: 8px;
    }

    .status-ok {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      margin-bottom: 20px;
      display: none;
      border: 2px solid #6366f1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-family: inherit;
      font-size: 1.1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: #1e293b;
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: #0f172a;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9em;
      margin-bottom: 16px;
    }

    .refresh-gps-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.75em;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">กำลังเตรียมระบบ AI...</p>
  </div>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <a href="index.html" class="back-btn" style="margin-bottom: 0;">← กลับเมนูหลัก</a>
      <div id="loggedInUserBadge"
        style="display: none; background: rgba(16,185,129,0.1); color: #10b981; padding: 4px 10px; border-radius: 12px; font-size: 0.85em; font-weight: 600; border: 1px solid rgba(16,185,129,0.2);">
      </div>
    </div>
    <div class="card">
      <h2>📷 บันทึกเวลาทำงาน</h2>

      <div class="form-group">
        <label id="locationLabel" for="locationSelect">เลือกหน่วยบริการ / สถานที่</label>
        <select id="locationSelect" onchange="handleLocationChange()">
          <option value="">-- กำลังโหลดหน่วยบริการ --</option>
        </select>
      </div>

      <div class="gps-box">
        <div class="gps-row">
          <span class="gps-label">พิกัดปัจจุบัน:</span>
          <span class="gps-value" id="currentGps">-</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">พิกัดเป้าหมาย:</span>
          <span class="gps-value" id="targetGps" style="color: #818cf8;">-</span>
        </div>
        <div class="gps-row">
          <span class="gps-label">ระยะห่าง:</span>
          <span class="gps-value" id="distanceText">-</span>
        </div>
        <div id="gpsStatusMsg" class="gps-status-msg">รอตรวจสอบ GPS...</div>
        <button class="refresh-gps-btn" onclick="forceRefreshGps()">🔄 อัปเดตตำแหน่งปัจจุบัน</button>
      </div>

      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay muted playsinline></video>
      </div>
      <div id="scanStatus" style="text-align:center; margin-top:10px; font-size:0.9em; color:#a5b4fc;"></div>

      <!-- ส่วนแสดงผลการสแกน QR -->
      <div id="qrReader" style="display:none; width:100%; border-radius:12px; overflow:hidden; margin-top:10px;"></div>
      <div id="qrStatus" style="text-align:center; margin-top:5px; font-size:0.8em; color:#f87171;"></div>

      <button id="btnAction" class="btn btn-primary" disabled>
        ⌛ รอตรวจสอบระยะทาง...
      </button>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <div id="modalName" style="font-size: 1.5em; font-weight: 700; color: #a5b4fc; margin-bottom: 8px;">...</div>
      <div id="modalInfo" style="color: #94a3b8; font-size: 0.9em; margin-bottom: 24px;">...</div>
      <button id="btnConfirm" class="btn btn-success" onclick="submitAttendance()">✅ ยืนยันบันทึกเวลา</button>
      <button class="btn" style="background:none; color:#94a3b8; margin-top:10px;"
        onclick="closeModal()">ยกเลิก</button>
    </div>
  </div>

  <script>
    // ดึง API URL: 1) localStorage (เครื่องที่เคยตั้งค่าไว้)  2) api-config.js (ทุกเครื่อง)
    let API_URL = (
      localStorage.getItem('GAS_API_URL') ||
      localStorage.getItem('gasApiUrl') ||
      (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '') ||
      (typeof window.GAS_API_URL !== 'undefined' ? window.GAS_API_URL : '')
    ).trim();
    let AUTH_TOKEN = sessionStorage.getItem('token') || sessionStorage.getItem('adminToken') || localStorage.getItem('token') || '';

    let locations = [];
    let knownFaces = [];
    let currentPos = null;
    let selectedLoc = null;
    let scanInterval = null;
    let currentMatch = null;
    let actionType = 'logAttendance';
    let scanMode = 'login'; // โหมดเริ่มต้น
    let MATCH_THRESHOLD = 0.45;
    let qrKey = ''; // เก็บค่ารหัส QR ถ้ามี
    let isQrMode = false;
    let qrVerified = false; // ตรวจสอบว่าสแกน QR ผ่านหรือยัง
    let html5QrCode = null;
    let isInitialized = false;
    let isRedirecting = false;

    async function init() {
      const loadingText = document.getElementById('loadingText');
      const overlay = document.getElementById('loadingOverlay');
      const adminName = sessionStorage.getItem('adminName');

      console.log('--- System Init Start ---');
      loadingText.innerHTML = `
        <div>กำลังตรวจสอบสถานะระบบ...</div>
        <div style="font-size:0.7em;color:#94a3b8;margin-top:5px;">User: ${adminName || 'Not Logged In'}</div>
      `;

      if (!API_URL) {
        loadingText.innerText = '❌ ไม่พบ API URL';
        return;
      }

      try {
        // 1. ตรวจสอบพารามิเตอร์เบื้องต้น
        const urlParams = new URLSearchParams(window.location.search);
        const urlLocId = urlParams.get('locId');
        const urlKey = urlParams.get('key');

        if (urlLocId && urlKey) {
          isQrMode = true;
          qrKey = urlKey;
          // ลบ Auto-Redirect ออกก่อนเพื่อหยุด Loop
          if (!adminName) {
            loadingText.innerHTML = `
                <div style="color:#fcd34d;">⚠️ จำเป็นต้อง Login ก่อนสแกน QR</div>
                <a href="login.html?to=${encodeURIComponent(window.location.href)}" style="display:inline-block;margin-top:10px;padding:8px 16px;background:#4f46e5;color:white;text-decoration:none;border-radius:8px;">คลิกเพื่อไปหน้า Login</a>
              `;
            return;
          }
        }

        // 2. ดึง Config
        loadingText.innerHTML = `
          <div>กำลังเชื่อมต่อเซิร์ฟเวอร์ (Step 1/3)...</div>
          <div style="font-size:0.6em;color:#64748b;word-break:break-all;">API: ${API_URL.substring(0, 50)}...</div>
        `;
        const fetchUrl = API_URL + (API_URL.includes('?') ? '&' : '?') + 'action=getConfig&token=' + encodeURIComponent(AUTH_TOKEN);

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 12000);

        const res = await fetch(fetchUrl, { signal: controller.signal });
        clearTimeout(timeoutId);

        loadingText.innerText = 'ประมวลผลข้อมูล (Step 2/3)...';
        const config = await res.json();

        if (!config || !config.locations) throw new Error('โครงสร้างข้อมูลไม่ถูกต้อง');

        locations = config.locations;
        scanMode = (config.scanMode || 'login').toLowerCase();
        MATCH_THRESHOLD = parseFloat(config.faceMatchThreshold) || 0.45;

        if (scanMode === 'no-login' && (!AUTH_TOKEN || AUTH_TOKEN === 'null' || AUTH_TOKEN.length < 10)) {
          AUTH_TOKEN = config.readToken || '';
        }

        // เตรียม UI
        const select = document.getElementById('locationSelect');
        if (locations.length > 0) {
          select.innerHTML = locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
          if (isQrMode && urlLocId) {
            selectedLoc = locations.find(l => l.id == urlLocId);
            if (selectedLoc) {
              select.value = selectedLoc.id;
              select.disabled = true;
            }
          }
          if (!selectedLoc) selectedLoc = locations[0];
          updateTargetGpsDisplay();
        }

        loadingText.innerText = 'เสร็จสมบูรณ์ (Step 3/3)...';

        // 3. ปิด Loading และเปิดระบบ GPS
        isInitialized = true;
        overlay.style.display = 'none';
        console.log('--- System Init Complete ---');

        setTimeout(() => {
          startGpsTracking();
          checkTodayStatus();
        }, 300);

      } catch (e) {
        console.error('Init Error:', e);
        loadingText.innerHTML = `
          <div style="color:#f87171;font-weight:bold;">❌ เกิดข้อผิดพลาด</div>
          <div style="font-size:0.8em;margin-top:5px;background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;">${e.message}</div>
          <button onclick="location.reload()" style="margin-top:15px;padding:10px 20px;background:#4f46e5;color:white;border:none;border-radius:12px;cursor:pointer;">🔄 ลองใหม่อีกครั้ง</button>
        `;
      }
    }

    let isAiLoaded = false;
    async function ensureAiLoaded() {
      if (isAiLoaded) return true;

      const overlay = document.getElementById('loadingOverlay');
      const text = document.getElementById('loadingText');
      overlay.style.display = 'flex';
      text.innerText = 'กำลังเตรียมระบบ AI และข้อมูลใบหน้า...';

      try {
        const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
        console.log('Loading AI models...');
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        console.log('AI Models loaded.');
        await loadFaces();
        isAiLoaded = true;
        overlay.style.display = 'none';
        return true;
      } catch (e) {
        console.error('AI Load failed:', e);
        alert('❌ โหลดระบบ AI ไม่สำเร็จ: ' + e.message);
        overlay.style.display = 'none';
        return false;
      }
    }

    async function loadFaces() {
      try {
        console.log('Fetching staff face data...');
        const res = await fetch(API_URL + '?action=getKnownFaces&token=' + encodeURIComponent(AUTH_TOKEN));
        const resText = await res.text();
        let data;
        try {
          data = JSON.parse(resText);
        } catch (e) {
          console.error('Failed to parse staff data:', resText);
          return;
        }

        if (Array.isArray(data)) {
          console.log(`Loaded ${data.length} staff records.`);
          knownFaces = data.map(u => {
            let desc = null;
            if (u.descriptor) {
              const values = Array.isArray(u.descriptor) ? u.descriptor : Object.values(u.descriptor);
              if (values.length === 128) desc = new Float32Array(values);
            }
            return { employeeId: u.employeeId, name: u.name || u.label, descriptor: desc };
          }).filter(u => u.descriptor !== null);
          console.log(`Initialized ${knownFaces.length} valid face descriptors.`);
        }
      } catch (e) {
        console.error('loadFaces failed:', e);
      }
    }

    function startGpsTracking() {
      if (!navigator.geolocation) return;
      navigator.geolocation.watchPosition(
        pos => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('currentGps').innerText = `${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)}`;
          checkDistance();
        },
        err => {
          document.getElementById('gpsStatusMsg').innerText = '❌ เข้าถึง GPS ไม่ได้';
          document.getElementById('gpsStatusMsg').className = 'gps-status-msg status-error';
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function forceRefreshGps() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('currentGps').innerText = `${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)}`;
          checkDistance();
          alert('อัปเดตตำแหน่งปัจจุบันแล้ว');
        }, err => alert('ไม่สามารถดึงตำแหน่งได้: ' + err.message), { enableHighAccuracy: true });
      }
    }

    function handleLocationChange() {
      const select = document.getElementById('locationSelect');
      selectedLoc = locations.find(l => l.id == select.value);
      updateTargetGpsDisplay();
      checkDistance();
    }

    function updateTargetGpsDisplay() {
      if (selectedLoc) {
        const lat = parseFloat(selectedLoc.lat) || 0;
        const lng = parseFloat(selectedLoc.lng) || 0;
        document.getElementById('targetGps').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      }
    }

    function checkDistance() {
      if (!isInitialized) return; // ห้ามทำงานถ้ายังโหลด Config ไม่เสร็จ
      const btn = document.getElementById('btnAction');
      const msg = document.getElementById('gpsStatusMsg');

      if (!currentPos || locations.length === 0) {
        btn.innerText = '📍 กำลังตรวจสอบระยะทาง...';
        btn.disabled = true;
        return;
      }

      // 1. ค้นหาจุดที่ใกล้ที่สุดที่อยู่ในระยะรัศมี
      let minDist = Infinity;
      let foundLoc = null;

      locations.forEach(loc => {
        const d = calculateDistance(currentPos.lat, currentPos.lng, loc.lat, loc.lng);
        if (d <= (parseFloat(loc.radius) || 100) && d < minDist) {
          minDist = d;
          foundLoc = loc;
        }
      });

      // อัปเดตจุดที่เลือก
      selectedLoc = foundLoc;

      if (!selectedLoc) {
        document.getElementById('distanceText').innerText = '-';
        msg.innerText = '❌ อยู่นอกระยะหน่วยบริการ';
        msg.className = 'gps-status-msg status-error';
        btn.disabled = true;
        btn.innerText = '🚫 ไม่อยู่ในพื้นที่บริการ';
        btn.className = 'btn btn-secondary btn-lg w-100 mt-3';
        updateTargetGpsDisplay();
        return;
      }

      // ถ้าเจอจุดบริการแล้ว
      const radius = parseFloat(selectedLoc.radius) || 100;
      document.getElementById('distanceText').innerText = minDist.toFixed(0) + ' เมตร';
      msg.innerText = `✅ อยู่ในระยะ ${radius} เมตร`;
      msg.className = 'gps-status-msg status-ok';
      btn.disabled = false;
      updateTargetGpsDisplay();

      // 2. ตรวจสอบความปลอดภัย (Login)
      const currentLocScanMode = (selectedLoc.scanMode || scanMode || 'login').toLowerCase();
      if (currentLocScanMode === 'login' && !isRedirecting) {
        const isAuthed = sessionStorage.getItem('adminAuth') === '1';
        const adminName = sessionStorage.getItem('adminName');

        if (!isAuthed || !adminName) {
          isRedirecting = true; // ล็อกไว้ไม่ให้ดีดซ้ำ
          btn.innerText = '🔐 กำลังพาไปหน้า Login...';
          btn.disabled = true;
          console.log(`[Security] ${selectedLoc.name} requires login.`);
          setTimeout(() => {
            window.location.href = 'login.html?to=' + encodeURIComponent(window.location.href);
          }, 800);
          return;
        }
      }

      // 3. ตรวจสอบสถานะ QR และการสแกนหน้า
      const hasQrVerified = (qrVerified || isQrMode);
      let rawVal = selectedLoc.qrRequireFace;
      let reqFace = (String(rawVal).trim().toLowerCase() === 'true');

      // แสดง Debug Info
      let debugDiv = document.getElementById('debugInfo');
      if (!debugDiv) {
        debugDiv = document.createElement('div');
        debugDiv.id = 'debugInfo';
        debugDiv.style = 'position:fixed; bottom:0; left:0; background:rgba(0,0,0,0.8); color:#0f0; font-size:10px; padding:5px; z-index:9999; pointer-events:none;';
        document.body.appendChild(debugDiv);
      }
      debugDiv.innerText = `Loc: ${selectedLoc.name} | Mode: ${currentLocScanMode} | QR: ${selectedLoc.qrEnabled} | ReqFace: ${reqFace} (Raw: ${rawVal})`;

      // กรณีที่ 1: ต้องสแกน QR แต่ยังไม่ได้สแกน
      if (selectedLoc.qrEnabled && !hasQrVerified) {
        btn.innerText = '🤳 สแกน QR Code ประจำจุด';
        btn.className = 'btn btn-primary btn-lg w-100 mt-3';
        btn.onclick = startQrScan;
        return;
      }

      // กรณีที่ 2: สแกน QR แล้ว และ "ไม่ต้องสแกนหน้า" (reqFace เป็น false)
      if (!reqFace) {
        btn.innerText = '✅ บันทึกเวลา (QR Verified)';
        btn.className = 'btn btn-success btn-lg w-100 mt-3';
        btn.onclick = () => {
          const name = sessionStorage.getItem('adminName');
          const empId = sessionStorage.getItem('employeeId');
          if (!name || !empId) {
            alert('⚠️ กรุณาเข้าสู่ระบบก่อนครับ');
            window.location.href = 'login.html?to=' + encodeURIComponent(window.location.href);
            return;
          }
          currentMatch = { name: name, employeeId: empId };
          submitAttendance();
        };
        return;
      }

      // กรณีที่ 3: ต้องสแกนใบหน้า
      btn.innerText = actionType === 'logAttendance' ? '📸 สแกนใบหน้าเข้างาน' : '📸 สแกนใบหน้าออกงาน';
      btn.className = 'btn btn-primary btn-lg w-100 mt-3';
      btn.onclick = startScan;
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function checkTodayStatus() {
      // ฟังก์ชันเดิมของคุณสำหรับเช็คสถานะการลงเวลา
    }

    async function startScan() {
      // ตรวจสอบและโหลด AI เมื่อจำเป็นเท่านั้น
      const ok = await ensureAiLoaded();
      if (!ok) return;

      const video = document.getElementById('video');
      const videoWrap = document.getElementById('videoWrap');
      const btn = document.getElementById('btnAction');

      if (selectedLoc.qrEnabled && !qrVerified) {
        return alert('กรุณาสแกน QR Code ก่อนครับ');
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        videoWrap.style.display = 'block';
        btn.disabled = true;
        btn.innerText = '🔍 กำลังค้นหาใบหน้า...';

        scanInterval = setInterval(async () => {
          const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
          if (detection && knownFaces.length > 0) {
            const faceMatcher = new faceapi.FaceMatcher(knownFaces.map(f => new faceapi.LabeledFaceDescriptors(f.employeeId, [f.descriptor])), MATCH_THRESHOLD);
            const bestMatch = faceMatcher.findBestMatch(detection.descriptor);

            if (bestMatch.label !== 'unknown') {
              const person = knownFaces.find(f => f.employeeId === bestMatch.label);
              currentMatch = person;
              clearInterval(scanInterval);
              stopCamera();
              showConfirmModal(person);
            } else {
              document.getElementById('scanStatus').innerText = 'ไม่พบข้อมูลใบหน้าในระบบ';
            }
          }
        }, 1000);
      } catch (e) {
        alert('ไม่สามารถเปิดกล้องได้: ' + e.message);
      }
    }

    function stopCamera() {
      const video = document.getElementById('video');
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
      document.getElementById('videoWrap').style.display = 'none';
    }

    async function startQrScan() {
      const btn = document.getElementById('btnAction');
      const readerEl = document.getElementById('qrReader');

      btn.disabled = true;
      btn.innerText = '⌛ กำลังเปิดกล้องหลัง...';
      readerEl.style.display = 'block';

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("qrReader");
      }

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          async (decodedText) => {
            console.log('QR Scanned:', decodedText);
            // แยกค่าจาก URL: scan.html?locId=...&key=...
            const url = new URL(decodedText);
            const scannedKey = url.searchParams.get('key');
            const scannedLocId = url.searchParams.get('locId');

            if (scannedLocId !== selectedLoc.id) {
              document.getElementById('qrStatus').innerText = '❌ QR Code นี้ไม่ใช่ของหน่วยบริการที่เลือก';
              return;
            }

            // ส่งไปตรวจสอบที่ Server
            qrKey = scannedKey;
            qrVerified = true;
            await html5QrCode.stop();
            readerEl.style.display = 'none';
            document.getElementById('qrStatus').innerText = '';

            // ตรวจสอบความจำเป็นในการสแกนหน้า
            const rawValue = selectedLoc.qrRequireFace;
            const reqFace = (rawValue === false || String(rawValue).trim().toLowerCase() === 'false') ? false : true;

            console.log('QR Scan Success. Setting qrVerified=true');
            checkDistance(); // อัปเดตสถานะปุ่มในหน้าหลักไว้ด้วย

            if (!reqFace) {
              const name = sessionStorage.getItem('adminName');
              const empId = sessionStorage.getItem('employeeId');
              currentMatch = { name: name, employeeId: empId };
              console.log('QR-Only: Auto-submitting attendance...');
              submitAttendance(); // บันทึกทันที!
            } else {
              console.log('Face Scan required. Closing QR reader.');
            }
          },
          (errorMessage) => { /* scan error, keep searching */ }
        );
      } catch (err) {
        alert('ไม่สามารถเปิดกล้องหลังได้: ' + err);
        btn.disabled = false;
        btn.innerText = '🤳 ลองใหม่อีกครั้ง';
      }
    }

    function showConfirmModal(person) {
      document.getElementById('modalName').innerText = person.name;
      document.getElementById('modalInfo').innerText = `ยืนยันการบันทึกเวลาที่: ${selectedLoc.name}`;
      document.getElementById('confirmModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('confirmModal').style.display = 'none';
      document.getElementById('btnAction').disabled = false;
      document.getElementById('btnAction').innerText = '📸 สแกนใบหน้าอีกครั้ง';
    }

    async function submitAttendance() {
      const btn = document.getElementById('btnConfirm');
      btn.disabled = true;
      btn.innerText = '⌛ กำลังบันทึก...';

      if (!currentMatch) return alert('ไม่พบข้อมูลผู้ใช้งาน กรุณาสแกนใบหน้าใหม่');

      const data = {
        action: actionType,
        employeeId: currentMatch.employeeId,
        name: currentMatch.name,
        locationId: selectedLoc.id,
        locationName: selectedLoc.name,
        lat: currentPos.lat,
        lng: currentPos.lng,
        qrKey: qrKey,
        token: AUTH_TOKEN
      };

      try {
        console.log('Submitting Attendance Data:', data);
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(data)
        });

        const resText = await res.text();
        console.log('Server Response Raw:', resText);

        let result;
        try {
          result = JSON.parse(resText);
        } catch (e) {
          throw new Error('Server returned invalid JSON: ' + resText.substring(0, 100));
        }

        if (result.blocked) {
          // ถูกบล็อก — ครั้งที่ 3 ขึ้นไป
          alert('🚫 ' + (result.message || 'ไม่สามารถสแกนได้อีก บันทึกครบ 2 ครั้งแล้ววันนี้'));
          window.location.href = 'index.html';

        } else if (result.duplicate) {
          // ซ้ำ action เดิม (เช่น ออกงาน 2 ครั้ง)
          alert('⚠️ ' + (result.message || 'คุณได้ลงชื่อประเภทนี้ไปแล้วในวันนี้'));
          window.location.href = 'index.html';

        } else if (result.success || result.status === 'ok') {
          alert('✅ บันทึกเวลาสำเร็จ!');
          window.location.href = 'index.html';

        } else {
          alert('❌ บันทึกไม่สำเร็จ: ' + (result.message || result.error || 'Unauthorized'));
          btn.disabled = false;
          btn.innerText = '✅ ยืนยันบันทึกเวลา';
        }
      } catch (e) {
        console.error('Submit Attendance Error:', e);
        alert('❌ เกิดข้อผิดพลาด: ' + e.message);
        btn.disabled = false;
        btn.innerText = '✅ ยืนยันบันทึกเวลา';
      }
    }

    init();
    function logout() {
      sessionStorage.clear();
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    }
  </script>

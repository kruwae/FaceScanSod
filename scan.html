<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้างาน (Fixed)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; min-height: 100vh; background: linear-gradient(160deg, #0f0f23 0%, #0d1b2a 60%, #0a0f1e 100%); color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 50px; position: relative; overflow-x: hidden; }
    .page-wrap { width: 100%; max-width: 560px; position: relative; z-index: 1; animation: fadeIn 0.5s ease; display: flex; flex-direction: column; align-items: center; }
    .top-bar { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #64748b; text-decoration: none; font-size: 0.85em; padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.25s ease; }
    .logout-btn { display: inline-flex; align-items: center; gap: 6px; color: #fca5a5; text-decoration: none; font-size: 0.85em; padding: 6px 12px; border-radius: 20px; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); transition: all 0.25s ease; font-family: 'Sarabun', sans-serif; font-weight: 600; cursor: pointer; }
    h2 { font-size: 1.1em; font-weight: 600; color: #c7d2fe; text-align: center; }
    .status-area { width: 100%; text-align: center; margin-bottom: 14px; }
    #main-status { font-size: 0.9em; color: #94a3b8; min-height: 22px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .video-container { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #060612; min-height: 280px; }
    video { width: 100%; height: auto; display: block; transform: scaleX(-1); opacity: 0; transition: opacity 0.5s ease; border-radius: 20px; }
    video.active { opacity: 1; }
    .scanner-frame { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .corner { position: absolute; width: 28px; height: 28px; border-color: #10b981; border-style: solid; opacity: 0.8; }
    .corner-tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner-tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-line { display: none; position: absolute; left: 8%; right: 8%; height: 2px; background: linear-gradient(90deg, transparent, #10b981, transparent); box-shadow: 0 0 8px rgba(16,185,129,0.8); z-index: 6; animation: scanMove 2s ease-in-out infinite; }
    .scan-line.active { display: block; }
    #overlay-status { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); color: #e2e8f0; padding: 6px 18px; border-radius: 30px; z-index: 10; white-space: nowrap; font-size: 0.84em; border: 1px solid rgba(255,255,255,0.1); }
    #btnStart { display: none; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 50px; padding: 16px 44px; font-size: 18px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif; box-shadow: 0 4px 25px rgba(99,102,241,0.45); margin: 20px auto 0; transition: all 0.3s ease; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
    .modal-content { background: linear-gradient(160deg, #1e1e3f 0%, #16213e 100%); border: 1px solid rgba(255,255,255,0.15); padding: 32px 28px; border-radius: 24px; width: 88%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; animation: modalSlideUp 0.35s ease; }
    .user-name { font-size: 24px; color: #a5b4fc; font-weight: 700; margin-bottom: 12px; }
    .btn-confirm { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 17px; font-size: 20px; font-weight: 700; border: none; border-radius: 14px; width: 100%; cursor: pointer; margin-bottom: 10px; }
    .btn-cancel { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; padding: 12px; font-size: 15px; font-weight: 600; border-radius: 14px; width: 100%; cursor: pointer; }
    @keyframes scanMove { 0% { top: 12%; } 50% { top: 82%; } 100% { top: 12%; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="top-bar"><a href="index.html" class="back-btn">← กลับ</a><h2>📷 สแกนเข้างาน</h2><button class="logout-btn" id="btnLogoutTop">ออกจากระบบ</button></div>
  <div class="status-area"><div id="main-status">⏳ กำลังเตรียมระบบ...</div></div>
  <div class="video-container">
    <div class="scanner-frame"><div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div><div class="scan-line" id="scanLine"></div></div>
    <div id="overlay-status">รอโหลด...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>
  <button id="btnStart">📷 เริ่มสแกนใบหน้า</button>
</div>

<div id="confirmModal" class="modal-overlay">
  <div class="modal-content">
    <div class="user-name" id="modalName">...</div>
    <div id="modalScore" style="color: #94a3b8; font-size: 0.9em; margin-bottom: 20px;"></div>
    <button class="btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button class="btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน</button>
  </div>
</div>

<script>
// --- CONFIG & UTILS ---
const SESSION_KEY = 'adminAuth';
const MATCH_THRESHOLD = 0.55;
const video = document.getElementById('video');
const mainStatus = document.getElementById('main-status');
const overlayStatus = document.getElementById('overlay-status');
const confirmModal = document.getElementById('confirmModal');
const btnStart = document.getElementById('btnStart');

function getApiUrl() { return (localStorage.getItem('gasApiUrl') || '').trim(); }
function getAuthToken() { return (localStorage.getItem('token') || '').trim(); }
function getReadToken() { return (localStorage.getItem('readToken') || '').trim(); }

let knownFaces = [];
let scanInterval = null;
let currentMatch = null;
const API_URL = getApiUrl();

// --- FACE SYSTEM ---
async function initFaceSystem() {
  if (!API_URL) {
    mainStatus.innerHTML = '<span style="color:#f87171">❌ ยังไม่ได้ตั้งค่า API URL</span>';
    return;
  }

  mainStatus.innerText = '⏳ กำลังโหลด AI Model...';
  const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
  
  try {
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
    
    mainStatus.innerText = '⏳ กำลังโหลดข้อมูลพนักงาน...';
    
    let data = null;
    const readToken = getReadToken();
    const authToken = getAuthToken();
    
    try {
      const res = await fetch(API_URL + '?action=getKnownFaces&readToken=' + encodeURIComponent(readToken));
      data = await res.json();
    } catch(e) {}

    if (!Array.isArray(data) && authToken) {
      try {
        const res = await fetch(API_URL + '?action=getKnownFaces&token=' + encodeURIComponent(authToken));
        data = await res.json();
      } catch(e) {}
    }

    if (!Array.isArray(data)) {
      try {
        const res = await fetch(API_URL + '?action=getKnownFaces');
        data = await res.json();
      } catch(e) {}
    }

    if (!Array.isArray(data) || data.length === 0) {
      mainStatus.innerHTML = '<span style="color:#f87171">❌ ไม่พบข้อมูลพนักงาน หรือ Token ไม่ถูกต้อง</span>';
      return;
    }

    knownFaces = data.map(u => ({
      employeeId: String(u.employeeId || '').trim(),
      name: String(u.name || u.label || '').trim(),
      descriptor: new Float32Array(Object.values(u.descriptor))
    })).filter(u => u.descriptor.length === 128);

    mainStatus.innerText = '✅ ระบบพร้อมใช้งาน';
    mainStatus.style.color = '#34d399';
    btnStart.style.display = 'block';
    overlayStatus.innerText = 'กดปุ่มเพื่อเริ่มสแกน';

  } catch (err) {
    mainStatus.innerHTML = '<span style="color:#f87171">❌ เกิดข้อผิดพลาด: ' + err.message + '</span>';
  }
}

async function startCamera() {
  btnStart.style.display = 'none';
  overlayStatus.innerText = 'กำลังเปิดกล้อง...';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    video.srcObject = stream;
    video.classList.add('active');
    document.getElementById('scanLine').classList.add('active');
    
    video.onloadedmetadata = () => {
      overlayStatus.innerText = 'มองกล้องเพื่อสแกน';
      startScanLoop();
    };
  } catch (err) {
    mainStatus.innerHTML = '<span style="color:#f87171">❌ เปิดกล้องไม่ได้: ' + err.message + '</span>';
    btnStart.style.display = 'block';
  }
}

function startScanLoop() {
  if (scanInterval) clearInterval(scanInterval);
  scanInterval = setInterval(async () => {
    if (video.paused || video.ended) return;
    
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if (!detection) {
      overlayStatus.innerText = 'ไม่พบใบหน้า';
      return;
    }

    const bestMatch = findBestMatch(detection.descriptor);
    if (bestMatch.distance < MATCH_THRESHOLD) {
      clearInterval(scanInterval);
      showModal(bestMatch);
    } else {
      overlayStatus.innerText = 'ไม่รู้จัก (' + bestMatch.distance.toFixed(2) + ')';
    }
  }, 500);
}

function findBestMatch(descriptor) {
  let best = { distance: 1.0, name: 'ไม่รู้จัก', employeeId: '' };
  knownFaces.forEach(user => {
    const dist = faceapi.euclideanDistance(descriptor, user.descriptor);
    if (dist < best.distance) {
      best = { distance: dist, name: user.name, employeeId: user.employeeId };
    }
  });
  return best;
}

function showModal(match) {
  currentMatch = match;
  document.getElementById('modalName').innerText = match.name;
  document.getElementById('modalScore').innerText = 'ความเหมือน: ' + ((1 - match.distance) * 100).toFixed(1) + '%';
  confirmModal.style.display = 'flex';
  overlayStatus.innerText = 'สแกนสำเร็จ';
}

async function confirmAttendance() {
  const btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.innerText = 'กำลังบันทึก...';

  const payload = {
    action: 'logAttendance',
    token: getAuthToken(),
    employeeId: currentMatch.employeeId || '',
    name: currentMatch.name || '',
    timestamp: new Date().toISOString()
  };

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await res.json();
    
    if (result.status === 'ok' || result.status === 'success') {
      alert('✅ บันทึกเวลาสำเร็จ: ' + (result.message || ''));
      window.location.reload();
    } else {
      throw new Error(result.message || 'Backend ปฏิเสธการบันทึก');
    }
  } catch (e) {
    alert('❌ บันทึกล้มเหลว: ' + e.message);
    btn.disabled = false;
    btn.innerText = '✅ ยืนยันเข้างาน';
  }
}

function cancelAttendance() {
  confirmModal.style.display = 'none';
  currentMatch = null;
  startScanLoop();
}

document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) !== '1') {
    window.location.replace('login.html');
    return;
  }
  initFaceSystem();
  btnStart.onclick = startCamera;
  document.getElementById('btnLogoutTop').onclick = () => {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.replace('login.html');
  };
});
</script>
</body>
</html>

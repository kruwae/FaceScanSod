    .btn-confirm { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 17px; font-size: 20px; font-weight: 700; box-shadow: 0 4px 20px rgba(16,185,129,0.35); margin-bottom: 10px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes btnPulse { 0%,100% { box-shadow: 0 4px 25px rgba(99,102,241,0.45); } 50% { box-shadow: 0 4px 40px rgba(99,102,241,0.7); } }
    @keyframes scanMove { 0% { top: 12%; } 50% { top: 82%; } 100% { top: 12%; } }

    .auth-badge-wrap { position: fixed; top: 14px; right: 14px; z-index: 9999; }

<body>
<div class="auth-badge-wrap" id="authBadgeHost"></div>
<div class="page-wrap">
  <div class="top-bar"><a href="index.html" class="back-btn">← กลับ</a><h2>📷 สแกนเข้างาน</h2><div class="spacer"></div></div>
  <div class="status-area" id="statusAreaRoot"><div id="main-status">⏳ กำลังเตรียมระบบ...</div><div id="gps-status"></div></div>

  <div id="gpsPermBanner" class="gps-permission-banner">📱 บราวเซอร์กำลังขอสิทธิ์ GPS — กรุณากด <strong style="color:#fbbf24">Allow</strong></div>
  <div id="gpsGuide" class="gps-guide"><div class="gps-guide-title" id="gpsGuideTitle">📱 วิธีแก้ GPS</div><div class="gps-guide-platform" id="gpsGuidePlatform"></div><div id="gpsGuideSteps"></div><div class="gps-fallback-title">🔄 แผนสำรอง / ฉุกเฉิน</div><div class="gps-fallback-row"><button class="btn-gps-fallback btn-wifi" id="btnWifiFallback">📦 แผนสำรอง</button><button class="btn-gps-fallback btn-offline" id="btnOfflineMode">📡 โหมดออฟไลน์</button></div></div>

  <div class="gps-info-card" id="gpsInfoCard"><div class="gps-info-row"><span class="gps-info-label">📍 สถานที่</span><span class="gps-info-value" id="infoLocName">—</span></div><div class="gps-info-row"><span class="gps-info-label">Latitude</span><span class="gps-info-value" id="infoLocLat">—</span></div><div class="gps-info-row"><span class="gps-info-label">Longitude</span><span class="gps-info-value" id="infoLocLng">—</span></div><div class="gps-info-row"><span class="gps-info-label">รัศมี</span><span class="gps-info-value" id="infoLocRadius">—</span></div><div class="gps-info-row" style="margin-top:4px;border-top:1px solid rgba(255,255,255,0.06);padding-top:6px"><span class="gps-info-label">ห่าง</span><span id="infoLocDist">—</span></div></div>
  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;"><button id="btnStart" onclick="startCamera('logAttendance')">📷 สแกนเข้างาน</button><button id="btnCheckOut" onclick="startCamera('logCheckout')" style="display: none;">🚪 สแกนเลิกงาน</button><button id="btnReload" type="button" onclick="window.location.reload()">🔄 Reload</button></div>

</div>
<div id="confirmModal" class="modal-overlay"><div class="modal-content"><div class="modal-avatar">🙋</div><p class="modal-title">ตรวจพบบุคคล</p><div class="user-name" id="modalName">...</div><div id="modalTime" class="time-badge">00:00</div><div id="modalLocation" class="loc-badge" style="display:none"></div><div id="modalScore" class="score-text"></div><button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button><button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน</button></div></div>
<script>
function getApiUrl(){return (localStorage.getItem('gasApiUrl')||GAS_API_URL||'').trim();}
function getReadToken(){try{return (localStorage.getItem('readToken')||'').trim();}catch(_){return ''}}
const API_URL=getApiUrl();
const video=document.getElementById('video'),mainStatus=document.getElementById('main-status'),overlayStatus=document.getElementById('overlay-status'),confirmModal=document.getElementById('confirmModal'),gpsStatus=document.getElementById('gps-status'),gpsAlertBox=document.getElementById('gps-alert-box'),btnStart=document.getElementById('btnStart'),btnCheckOut=document.getElementById('btnCheckOut'),btnReload=document.getElementById('btnReload'),locationSelector=document.getElementById('locationSelector'),locationSelect=document.getElementById('locationSelect'),btnConfirmLocation=document.getElementById('btnConfirmLocation'),gpsInfoCard=document.getElementById('gpsInfoCard'),gpsGuide=document.getElementById('gpsGuide'),gpsPermBanner=document.getElementById('gpsPermBanner'),SESSION_KEY='adminAuth',MATCH_THRESHOLD=0.45;
let knownFaces=[],scanInterval=null,currentMatch=null,currentMatchInfo=null,currentLat=null,currentLng=null,currentLocation=null,allLocations=[],gpsSkipped=false,gpsSkipReason='',faceSystemInitialized=false,currentAction='logAttendance',fallbackSettings={enabled:false,contactText:'กรุณาติดต่อผู้ดูแลระบบเพื่อขอเปิดใช้งานแผนสำรอง'},previousGpsReading=null,currentGpsReading=null,livenessSession=null,livenessLoopCount=0,livenessChallengeTimeout=null;
function meshEnabled(){return typeof MeshService!=='undefined'&&MeshService.isEnabled()}
function detectPlatform(){const ua=navigator.userAgent.toLowerCase();if(/iphone|ipad|ipod/.test(ua))return'ios';if(/android/.test(ua))return'android';if(/macintosh|mac os/.test(ua))return'mac';return'windows'}
async function checkGeolocationPermission(){if(!navigator.geolocation)return'unsupported';if(!navigator.permissions)return'unknown';try{return (await navigator.permissions.query({name:'geolocation'})).state}catch(_){return'unknown'}}
async function checkCamera(){return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)}
function showError(msg){mainStatus.innerHTML='<span style="color:#f87171">❌ '+msg+'</span>'}
function showGpsGuide(errorCode){const platform=detectPlatform(),guides={ios:{label:'iPhone / iPad (Safari)',steps:['เปิด Settings → Privacy & Security → Location Services','เปิดสิทธิ์ Location ให้ Safari เป็น While Using','กลับมาหน้านี้แล้วอนุญาต GPS อีกครั้ง']},android:{label:'Android (Chrome)',steps:['แตะไอคอนล็อกข้าง URL → Site settings','เปิดสิทธิ์ Location เป็น Allow','ตรวจว่า Location ของเครื่องเปิดอยู่ แล้วลองใหม่']},mac:{label:'Mac',steps:['เปิด Site Settings ของเบราว์เซอร์','อนุญาต Location ให้เว็บไซต์นี้','ตรวจสิทธิ์ Location Services ใน System Settings']},windows:{label:'Windows',steps:['เปิด Site Settings ของเบราว์เซอร์','อนุญาต Location ให้เว็บไซต์นี้','ตรวจว่า Windows Location Access เปิดใช้งานอยู่']}}[platform],titleMap={1:'❗ ถูกปฏิเสธสิทธิ์ GPS',2:'❗ ไม่สามารถรับสัญญาณ GPS',3:'❗ GPS หมดเวลารอ'};document.getElementById('gpsGuideTitle').innerText=titleMap[errorCode]||'📱 วิธีแก้ปัญหา GPS';document.getElementById('gpsGuidePlatform').innerText='ℹ️ อุปกรณ์ที่ตรวจพบ: '+guides.label;document.getElementById('gpsGuideSteps').innerHTML=guides.steps.map((s,i)=>'<div class="gps-guide-step"><span class="gps-step-num">'+(i+1)+'.</span><span>'+s+'</span></div>').join('');gpsGuide.style.display='block'}
function hideGpsGuide(){gpsGuide.style.display='none'}
function formatDistanceMeters(dist){return Math.round(dist).toString()}
function computeGpsQualityFlags(reading,previousReading){const flags={suspiciousGps:false,accuracyWarning:false,speedWarning:false};if(!reading)return flags;const accuracy=typeof reading.accuracy==='number'?reading.accuracy:null;if(accuracy!==null&&accuracy>50){flags.suspiciousGps=true;flags.accuracyWarning=true}if(previousReading&&typeof previousReading.latitude==='number'&&typeof previousReading.longitude==='number'&&typeof previousReading.timestamp==='number'){const distanceKm=haversineKm(previousReading.latitude,previousReading.longitude,reading.latitude,reading.longitude);const elapsedSec=Math.max(1,(reading.timestamp-previousReading.timestamp)/1000);const speedMps=(distanceKm*1000)/elapsedSec;if(speedMps>10){flags.suspiciousGps=true;flags.speedWarning=true}}return flags}

function showModal(match,liveness){currentMatchInfo=match;currentMatch=match.employeeId||match.name;window._latestLivenessResult=liveness||window._latestLivenessResult||null;document.getElementById('modalName').innerText=match.name;const now=new Date(),timeStr=now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});document.getElementById('modalTime').innerText='เวลาเข้างาน: '+timeStr+' น.';const matchScore=((1-match.distance)*100).toFixed(1);const liveScore=window._latestLivenessResult&&typeof window._latestLivenessResult.statusScore==='number'?window._latestLivenessResult.statusScore:null;const liveText=window._latestLivenessResult?' • Liveness: '+(liveScore!==null?liveScore.toFixed(2):'n/a')+' ('+window._latestLivenessResult.status+')':'';document.getElementById('modalScore').innerText='ความเหมือน: '+matchScore+'%'+liveText;const modalLoc=document.getElementById('modalLocation');if(meshEnabled()){modalLoc.innerHTML='📡 โหมดออฟไลน์ — บันทึกในเครื่อง';modalLoc.style.display='block';modalLoc.style.background='rgba(245,158,11,0.1)';modalLoc.style.borderColor='rgba(245,158,11,0.3)';modalLoc.style.color='#fcd34d'}else if(currentLocation){modalLoc.innerHTML='📍 '+currentLocation.name;modalLoc.style.display='block';modalLoc.style.background='rgba(99,102,241,0.12)';modalLoc.style.borderColor='rgba(99,102,241,0.25)';modalLoc.style.color='#a5b4fc'}else{modalLoc.style.display='none'}if(window._latestLivenessResult&&window._latestLivenessResult.challenge&&window._latestLivenessResult.requiresChallenge){document.getElementById('modalTime').innerText='เวลาเข้างาน: '+timeStr+' น. • ยืนยันด้วย '+window._latestLivenessResult.challenge}const btnConfirmEl=bindConfirmButton();const scoreValue=liveScore===null?-1:liveScore;removeLivenessAdviceBox();btnConfirmEl.classList.remove('retry-mode');if(scoreValue>=0&&scoreValue<0.7){document.getElementById('modalScore').innerHTML='❌ ไม่ผ่านการยืนยันใบหน้า ('+scoreValue.toFixed(3)+')';setRetryButton(btnConfirmEl);mainStatus.innerText='❌ ไม่ผ่านการยืนยันใบหน้า กรุณาลองใหม่';overlayStatus.innerText='❌ ไม่ผ่านการยืนยันใบหน้า';overlayStatus.style.background='rgba(239,68,68,0.6)';renderLivenessAdvice(scoreValue)}else{btnConfirmEl.disabled=false;btnConfirmEl.innerText='✅ ยืนยันเข้างาน';btnConfirmEl.onclick=function(){confirmAttendance()};mainStatus.innerText=window._latestLivenessResult&&window._latestLivenessResult.status==='warn'?'กรุณายืนยันและขยับหน้าเล็กน้อย':'กรุณายืนยัน...'}confirmModal.style.display='flex'}
async function _sendToApi(btn,payload){try{const res=await fetch(API_URL,{method:'POST',body:JSON.stringify(payload)});const data=await res.json();alert('✅ '+(data.message||'บันทึกเวลาสำเร็จ'));window.location.replace('index.html')}catch(e){alert('❌ บันทึกล้มเหลว: '+e.message);btn.disabled=false;btn.innerText='✅ ยืนยันเข้างาน'}}
async function confirmAttendance(){const btn=document.getElementById('btnConfirm');btn.disabled=true;btn.innerText='กำลังบันทึก...';const mode=meshEnabled()?'mesh':(window._locationMode||'gps'),gpsQuality=getGpsPayloadQuality(),liveness=window._latestLivenessResult||{status:'unknown',statusScore:null,method:'none',frameCount:0,challenge:'none',risk:0,flags:{}},requestId='req_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,10),clientTimestamp=Date.now(),idempotencyKey=requestId,gpsStatusValue=mode==='mesh'?'mesh_offline':mode,payload={action:currentAction,name:currentMatch,lat:currentLat,lng:currentLng,locationName:currentLocation?currentLocation.name:'',gpsStatus:gpsStatusValue,gpsSkipReason:gpsSkipped?gpsSkipReason:'',userAgent:navigator.userAgent,employeeId:currentMatch,position:(currentMatchInfo&&currentMatchInfo.position)||'',gpsAccuracy:gpsQuality.accuracy,gpsAltitude:gpsQuality.altitude,gpsTimestamp:gpsQuality.timestamp,suspiciousGps:gpsQuality.suspiciousGps,requestId:requestId,clientTimestamp:clientTimestamp,idempotencyKey:idempotencyKey,livenessStatus:liveness.status,livenessScore:liveness.statusScore,livenessMethod:liveness.method,livenessChallenge:liveness.challenge||'none',livenessFrameCount:liveness.frameCount||0,livenessRisk:liveness.risk||0,livenessFlags:liveness.flags||{},auditLog:{result:'pending',reason:'',matchScore:currentMatchInfo&&typeof currentMatchInfo.distance==='number'?(1-currentMatchInfo.distance):null,gps:{latitude:currentLat,longitude:currentLng,locationName:currentLocation?currentLocation.name:'',accuracy:gpsQuality.accuracy,altitude:gpsQuality.altitude,timestamp:gpsQuality.timestamp,suspiciousGps:gpsQuality.suspiciousGps},device:{userAgent:navigator.userAgent,platform:detectPlatform(),language:navigator.language||'',vendor:navigator.vendor||'',hardwareConcurrency:navigator.hardwareConcurrency||null,deviceMemory:navigator.deviceMemory||null,online:navigator.onLine},flags:{gpsSkipped:!!gpsSkipped,meshMode:meshEnabled(),suspiciousGps:!!gpsQuality.suspiciousGps,locationOutOfRange:!!(window._gpsRangeAllowed===false),speedAnomaly:!!(gpsQuality.suspiciousGps&&gpsQuality.accuracy!==null&&gpsQuality.accuracy>50),livenessStatus:liveness.status,livenessChallenge:liveness.challenge||'none',livenessFrameCount:liveness.frameCount||0,livenessRisk:liveness.risk||0}}};if(gpsQuality.suspiciousGps&&mode!=='mesh'){const proceed=confirm('⚠️ สัญญาณ GPS มีความน่าสงสัย ต้องการบันทึกต่อหรือไม่?');if(!proceed){btn.disabled=false;btn.innerText='✅ ยืนยันเข้างาน';return}}if(liveness.status!=='pass'&&liveness.status!=='warn'&&liveness.result!=='pass'){btn.disabled=false;btn.innerText='⛔ ไม่ผ่านการยืนยันใบหน้า';return}if(typeof liveness.statusScore==='number'&&liveness.statusScore<0.7){btn.disabled=false;btn.innerText='ลองใหม่';btn.classList.add('retry-mode');mainStatus.innerText='❌ ไม่ผ่านการยืนยันใบหน้า กรุณาลองใหม่';overlayStatus.innerText='❌ ไม่ผ่านการยืนยันใบหน้า';overlayStatus.style.background='rgba(239,68,68,0.6)';const advice=getLivenessAdvice(liveness.statusScore);const adviceBox=document.getElementById('livenessAdviceBox');if(adviceBox){adviceBox.innerHTML='<div style="font-weight:700;margin-bottom:4px">คำแนะนำให้ผ่านครั้งถัดไป</div><div>'+advice+'</div>';adviceBox.style.display='block'}return}if(liveness.status==='warn'&&liveness.requiresChallenge){const proceedLiveness=confirm('⚠️ ต้องยืนยันตามคำสั่งที่แสดง ต้องการดำเนินการต่อหรือไม่?');if(!proceedLiveness){btn.disabled=false;btn.innerText='✅ ยืนยันเข้างาน';return}}if(meshEnabled()){try{const result=MeshService.sendMeshData(payload);alert('📡 '+result.message);window.location.replace('index.html')}catch(meshErr){alert('⚠️ โหมดออฟไลน์ล้มเหลว กำลังส่งผ่าน API ปกติ');await _sendToApi(btn,payload)}return}await _sendToApi(btn,payload)}
function cancelAttendance(){confirmModal.style.display='none';currentMatch=null;currentMatchInfo=null;if(scanInterval)clearInterval(scanInterval);if(video.srcObject){video.srcObject.getTracks().forEach(function(t){t.stop()});video.srcObject=null}video.classList.remove('active');document.getElementById('scanLine').classList.remove('active');mainStatus.innerText='✅ ระบบพร้อมใช้งาน';mainStatus.style.color='#34d399';overlayStatus.innerText='รอโหลด...';overlayStatus.style.background='rgba(0,0,0,0.65)';btnStart.style.display='inline-block';if(btnCheckOut)btnCheckOut.style.display='inline-block';resetLivenessSession()}
function haversineKm(lat1,lon1,lat2,lon2){const R=6371,dLat=deg2rad(lat2-lat1),dLon=deg2rad(lon2-lon1),a=Math.sin(dLat/2)**2+Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function deg2rad(deg){return deg*Math.PI/180}
async function init(){console.log('[scan] init() start');if(sessionStorage.getItem(SESSION_KEY)!=='1'){console.warn('[scan] blocked by SESSION_KEY');window.location.replace('login.html?to=scan.html');return}if(!API_URL){console.warn('[scan] blocked by missing API_URL');showError('ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#fbbf24">ไปตั้งค่า</a>');return}window._locationMode='gps';window._wifiType='';if(typeof MeshService!=='undefined'){try{MeshService.injectToggleButton(document.getElementById('statusAreaRoot'));window.addEventListener('online',async()=>{if(!MeshService.isEnabled()&&navigator.onLine){try{const res=await MeshService.sync(getApiUrl());if(res.synced>0){console.log(`[Mesh] Auto-synced ${res.synced} records on reconnect!`);alert(`📡 ซิงค์ข้อมูลออฟไลน์สำเร็จ ${res.synced} รายการ`)}}catch(e){console.error('[Mesh] Auto-sync failed',e)}}});const channel=new BroadcastChannel('mesh_sync');channel.onmessage=async(e)=>{if(e.data&&e.data.type==='NEW_RECORD'&&navigator.onLine&&!MeshService.isEnabled()){await MeshService.sync(getApiUrl())}}}catch(_){}}bindFallbackButtons();if(meshEnabled()){MeshService.showBanner();const cachedLocations=MeshService.getCachedLocations();if(cachedLocations.length>0){allLocations=cachedLocations;renderLocations(cachedLocations,false);currentLocation=cachedLocations[0];locationSelector.style.display='block';updateGpsInfoCard(currentLocation,'offline')}mainStatus.innerText='📡 โหมดออฟไลน์ — ระบบพร้อมสแกน';mainStatus.style.color='#fcd34d';await ensureFaceSystemReady();return}mainStatus.innerText='1/4 ตรวจสอบกล้อง...';const cameraOk=await checkCamera();console.log('[scan] checkCamera result=',cameraOk);if(!cameraOk){showError('❌ เข้าถึงกล้องไม่ได้ — กรุณาอนุญาตสิทธิ์กล้องแล้วรีเฟรช');return}mainStatus.innerText='2/4 โหลดหน่วยบริการ...';mainStatus.style.color='#34d399';let config;try{config=await fetch(API_URL+'?action=getConfig').then(function(r){return r.json()});fallbackSettings=config.fallbackSettings||fallbackSettings}catch(e){showError('เชื่อมต่อ API ไม่ได้: '+e.message);return}allLocations=Array.isArray(config.locations)?config.locations.filter(function(l){return l.enabled!==false}):[];if(typeof MeshService!=='undefined'){try{MeshService.cacheLocations(allLocations)}catch(_){}}if(allLocations.length===0){currentLocation=null;gpsStatus.innerHTML='<span style="color:#34d399">📍 ไม่จำกัดพื้นที่</span>';await ensureFaceSystemReady();return}renderLocations(allLocations,false);locationSelector.style.display='block';mainStatus.innerText='2/4 เลือกหน่วยบริการ แล้วกดยืนยัน';mainStatus.style.color='#a5b4fc';await waitForLocationConfirm();mainStatus.innerText='3/4 ตรวจสอบ GPS...';mainStatus.style.color='#94a3b8';let permState='unknown';try{permState=await checkGeolocationPermission()}catch(_){}if(permState==='unsupported'){showError('❌ อุปกรณ์นีไม่รองรับ GPS');showGpsGuide(2);return}if(permState==='prompt'){gpsPermBanner.style.display='block';mainStatus.innerText='⏳ รอการอนุญาต GPS...'}if(permState==='denied'){showError('❗ ถูกปฏิเสธสิทธิ์ GPS — ใช้แผนสำรองหรือโหมดออฟไลน์ได้');showGpsGuide(1);return}try{await checkGPSAndAutoMatch();await ensureFaceSystemReady()}catch(e){showError(e.message)}}

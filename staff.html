<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>👥 จัดการบุคลากร | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="adminLock">
    <input type="password" id="lockCode" onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">Login</button>
    <div id="lockMsg"></div>
  </div>
  <div id="adminContent" style="display:none;">
    <h1>Staff Admin</h1>
  </div>

  <script>
    const SESSION_KEY = 'adminAuth';
    const lockCode = document.getElementById('lockCode');
    const lockMsg = document.getElementById('lockMsg');

    function isAuthed() {
      try { return sessionStorage.getItem(SESSION_KEY) === '1'; } catch (e) { return false; }
    }

    function getSessionRole() {
      try {
        return String(
          sessionStorage.getItem('adminRole') ||
          localStorage.getItem('adminRole') ||
          sessionStorage.getItem('role') ||
          localStorage.getItem('role') ||
          localStorage.getItem('userRole') ||
          localStorage.getItem('roles') ||
          sessionStorage.getItem('roles') ||
          ''
        ).trim().toLowerCase();
      } catch (e) {
        return '';
      }
    }

    function canAccessStaffPage() {
      const role = getSessionRole();
      return role === 'admin' || role === 'super_admin';
    }

    function showAdmin() {
      document.getElementById('adminLock').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
    }

    function showLock(msg) {
      document.getElementById('adminLock').style.display = 'block';
      document.getElementById('adminContent').style.display = 'none';
      lockMsg.textContent = msg || '';
    }

    async function doLogin() {
      const code = String(lockCode.value || '').trim();
      if (!code) return showLock('กรุณากรอกรหัส');
      try {
        const apiUrl = String((localStorage.getItem('GAS_API_URL') || localStorage.getItem('gasApiUrl') || '')).trim();
        if (!apiUrl) return showLock('ยังไม่ได้ตั้งค่า API URL');
        const res = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', authMethod: 'code', username: 'admin', code })
        });
        const data = await res.json();
        if (data && data.status === 'ok' && data.token) {
          localStorage.setItem('token', data.token);
          if (data.readToken) localStorage.setItem('readToken', data.readToken);
          sessionStorage.setItem(SESSION_KEY, '1');
          showAdmin();
        } else {
          showLock(data?.message || data?.error || 'รหัสไม่ถูกต้อง');
        }
      } catch (e) {
        showLock('เชื่อมต่อ Server ไม่ได้');
      }
    }

    function requireAuth() {
      if (isAuthed() && canAccessStaffPage()) return showAdmin();
      showLock(isAuthed() ? 'หน้านี้อนุญาตเฉพาะ admin และ super_admin' : 'กรุณาเข้าสู่ระบบ Admin');
    }

    window.addEventListener('pageshow', requireAuth);
    requireAuth();
  </script>
</body>
</html>
